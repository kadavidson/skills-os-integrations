<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coursera Skills OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F4F1;
      color: #1C1917;
      -webkit-font-smoothing: antialiased;
    }
    textarea, input, button { font-family: inherit; }
    @keyframes blink   { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes slideUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes mcpPulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.85); } }

    .scroll { overflow-y: auto; overflow-x: hidden; }
    .scroll::-webkit-scrollbar { width: 4px; }
    .scroll::-webkit-scrollbar-track { background: transparent; }
    .scroll::-webkit-scrollbar-thumb { background: #E8E5E0; border-radius: 2px; }

    /* ── Cards ── */
    .card {
      background: #FFFFFF;
      border-radius: 12px;
      border: 1px solid rgba(28,25,23,0.07);
      box-shadow: 0 0 0 1px rgba(28,25,23,0.04), 0 1px 3px rgba(0,0,0,0.05), 0 3px 8px rgba(0,0,0,0.04);
      transition: box-shadow 150ms cubic-bezier(0.4,0,0.2,1), background 150ms cubic-bezier(0.4,0,0.2,1), transform 150ms cubic-bezier(0.4,0,0.2,1);
    }
    .card:hover { box-shadow: 0 0 0 1px rgba(28,25,23,0.06), 0 4px 14px rgba(0,0,0,0.09), 0 8px 24px rgba(0,0,0,0.05); background: #FAFAF8; }
    .card-static { background: #FFFFFF; border-radius: 12px; border: 1px solid rgba(28,25,23,0.07); box-shadow: 0 0 0 1px rgba(28,25,23,0.04), 0 1px 3px rgba(0,0,0,0.05); }

    /* ── Buttons ── */
    .btn {
      border: none; font-family: inherit; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 120ms cubic-bezier(0.4,0,0.2,1);
    }
    .btn:hover  { transform: translateY(-1px); filter: brightness(1.06); }
    .btn:active { transform: scale(0.98); filter: brightness(0.96); }
    .btn-primary { background: #1C1917; color: #FFFFFF; border-radius: 8px; }
    .btn-accent  { background: #5B5FEF; color: #FFFFFF; border-radius: 8px; }

    /* ── Sidebar nav ── */
    .nav-item {
      position: relative; width: 100%; text-align: left; border: none;
      padding: 9px 12px; border-radius: 8px;
      display: flex; align-items: center; gap: 9px;
      background: transparent; color: #78716C;
      font-size: 13px; font-weight: 400; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 150ms cubic-bezier(0.4,0,0.2,1), color 150ms cubic-bezier(0.4,0,0.2,1);
    }
    .nav-item:hover { background: rgba(28,25,23,0.05); color: #1C1917; }
    .nav-item.active { background: rgba(28,25,23,0.07); color: #1C1917; font-weight: 500; }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
      width: 2.5px; background: #5B5FEF; border-radius: 0 2px 2px 0;
    }

    /* ── Vignette transition ── */
    @keyframes vignetteIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .vignette { animation: vignetteIn 260ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    /* ── Verify card ── */
    @keyframes scaleIn   { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    @keyframes glowPulse {
      0%   { box-shadow: 0 0 0 2px #5B5FEF, 0 0 28px rgba(91,95,239,.50), 0 12px 40px rgba(0,0,0,.35); }
      50%  { box-shadow: 0 0 0 3px #5B5FEF, 0 0 48px rgba(91,95,239,.70), 0 12px 40px rgba(0,0,0,.35); }
      100% { box-shadow: 0 0 0 2px #5B5FEF, 0 0 18px rgba(91,95,239,.28), 0 12px 40px rgba(0,0,0,.35); }
    }
    .glow-card {
      animation: scaleIn 0.42s cubic-bezier(0.34,1.3,0.64,1) forwards,
                 glowPulse 1.6s ease-in-out 0.5s 1 forwards;
      box-shadow: 0 0 0 2px #5B5FEF, 0 0 18px rgba(91,95,239,.28), 0 12px 40px rgba(0,0,0,.35);
    }

    @keyframes fadeSlide { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }
    .fade-slide { animation: fadeSlide 0.22s ease-out forwards; }

    /* ── Confidence chips ── */
    .chip-conf {
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-family: inherit;
      transition: all 150ms cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Typography helpers ── */
    .label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .caption { font-size: 12px; color: #A8A29E; }

    textarea { resize: none; outline: none; }
    textarea:focus { border-color: #5B5FEF !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const C = {
      canvas:  '#F5F4F1',  surface: '#FFFFFF',  muted:  '#F0EDE8',
      border:  '#E8E5E0',  tPri:   '#1C1917',   tSec:   '#57534E',
      tMut:    '#A8A29E',  accent:  '#5B5FEF',  warm:   '#E76F3A',
      success: '#059669',  warning: '#D97706',   bg:     '#0A0A0F',
      sbBg:    '#ECEAE6',  sbMut:   '#78716C',  sbTxt:  '#1C1917',
      accentLight: 'rgba(91,95,239,0.09)',
    };

    /* ── Nav mini illustrations ── */
    const IconMyPlan = ({ active = false }) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M4 20 C7 20 9 16 12 12 C15 8 17 4 20 4"
              stroke={active ? 'rgba(139,143,255,0.55)' : 'rgba(255,255,255,0.15)'}
              strokeWidth="1.5" strokeDasharray="2 2.5" strokeLinecap="round"/>
        <circle cx="4"  cy="20" r="3"   fill={active ? '#8B8FFF' : '#4A4A4E'}/>
        <circle cx="12" cy="12" r="3.5" fill={active ? '#5B5FEF' : '#3A3A3E'}/>
        <circle cx="12" cy="12" r="1.5" fill={active ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.08)'}/>
        <circle cx="20" cy="4"  r="2.5" fill={active ? '#E76F3A' : '#3A3A3E'}/>
        <circle cx="20" cy="4"  r="1"   fill={active ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.12)'}/>
      </svg>
    );

    const IconLearn = ({ active = false }) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 20 L3 16.5 V7 L12 10.5 Z"
              fill={active ? 'rgba(91,95,239,0.75)' : 'rgba(255,255,255,0.18)'}/>
        <path d="M12 20 L21 16.5 V7 L12 10.5 Z"
              fill={active ? 'rgba(91,95,239,0.35)' : 'rgba(255,255,255,0.08)'}/>
        <line x1="12" y1="10.5" x2="12" y2="20"
              stroke={active ? 'rgba(139,143,255,0.5)' : 'rgba(255,255,255,0.15)'} strokeWidth="1.2"/>
        <path d="M16.5 2 L14.8 6 L16.8 6 L14.5 10 L19.5 5 L17.5 5 Z"
              fill={active ? '#E76F3A' : '#5A5A5E'}/>
      </svg>
    );

    const IconVerify = ({ active = false }) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2.5 L3 6.5 V12 C3 17 7 21.5 12 23 C17 21.5 21 17 21 12 V6.5 Z"
              fill={active ? 'rgba(91,95,239,0.2)' : 'rgba(255,255,255,0.06)'}
              stroke={active ? 'rgba(91,95,239,0.75)' : 'rgba(255,255,255,0.18)'} strokeWidth="1.2"/>
        <path d="M12 5.5 L6 8 V12 C6 15.7 8.5 19 12 20.5 C15.5 19 18 15.7 18 12 V8 Z"
              fill={active ? 'rgba(91,95,239,0.45)' : 'rgba(255,255,255,0.04)'}/>
        <path d="M8.5 12.5 L11 15 L16.5 9"
              stroke={active ? '#fff' : 'rgba(255,255,255,0.35)'}
              strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    const IconWallet = ({ active = false }) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3.5" y="7" width="17" height="11" rx="2.5"
              fill={active ? 'rgba(91,95,239,0.35)' : 'rgba(255,255,255,0.08)'}
              transform="rotate(-4 12 12.5)"/>
        <rect x="3" y="9" width="18" height="12" rx="2.5"
              fill={active ? '#5B5FEF' : '#3A3A3E'}/>
        <circle cx="8.5" cy="13.5" r="2.5" fill={active ? '#E76F3A' : '#5A5A5E'}/>
        <rect x="13" y="12.5" width="5.5" height="1.2" rx="0.6"
              fill={active ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.2)'}/>
        <rect x="13" y="15" width="3.5" height="1" rx="0.5"
              fill={active ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.1)'}/>
      </svg>
    );

    /* ── Source card + agent mini illustrations ── */
    const IconAgent = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="8.5" fill="rgba(91,95,239,0.2)" stroke="rgba(91,95,239,0.6)" strokeWidth="1.3"/>
        <circle cx="9"  cy="10.5" r="1.8" fill="#8B8FFF"/>
        <circle cx="15" cy="10.5" r="1.8" fill="#8B8FFF"/>
        <circle cx="12" cy="15"   r="1.8" fill="#E76F3A"/>
        <line x1="9"  y1="10.5" x2="15" y2="10.5" stroke="rgba(139,143,255,0.5)" strokeWidth="1"/>
        <line x1="9"  y1="10.5" x2="12" y2="15"   stroke="rgba(139,143,255,0.4)" strokeWidth="1"/>
        <line x1="15" y1="10.5" x2="12" y2="15"   stroke="rgba(139,143,255,0.4)" strokeWidth="1"/>
      </svg>
    );

    const IconWorkday = () => (
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="5.5" r="2.8" fill="rgba(255,255,255,0.9)"/>
        <circle cx="4" cy="13.5" r="2"   fill="rgba(255,255,255,0.6)"/>
        <circle cx="14" cy="13.5" r="2"  fill="rgba(255,255,255,0.6)"/>
        <path d="M2 17.5 Q4 12 9 12 Q14 12 16 17.5"
              stroke="rgba(255,255,255,0.35)" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
      </svg>
    );

    const IconMeridian = () => (
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
        <rect x="6"   y="12.5" width="6"  height="3"   rx="1" fill="rgba(255,255,255,0.55)"/>
        <rect x="3.5" y="7.5"  width="11" height="4"   rx="1" fill="rgba(255,255,255,0.75)"/>
        <rect x="1.5" y="2.5"  width="15" height="4"   rx="1" fill="rgba(255,255,255,0.92)"/>
      </svg>
    );

    const IconClaude = () => (
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
        <circle cx="9"  cy="9"    r="2.8" fill="rgba(255,255,255,0.9)"/>
        <circle cx="3"  cy="4.5"  r="1.4" fill="rgba(255,255,255,0.5)"/>
        <circle cx="15" cy="4.5"  r="1.4" fill="rgba(255,255,255,0.5)"/>
        <circle cx="3"  cy="13.5" r="1.4" fill="rgba(255,255,255,0.5)"/>
        <circle cx="15" cy="13.5" r="1.4" fill="rgba(255,255,255,0.5)"/>
        <line x1="9" y1="9" x2="3"  y2="4.5"  stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
        <line x1="9" y1="9" x2="15" y2="4.5"  stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
        <line x1="9" y1="9" x2="3"  y2="13.5" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
        <line x1="9" y1="9" x2="15" y2="13.5" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>
      </svg>
    );

    const IconSeal = () => {
      const rays = Array.from({length: 12}, (_, i) => {
        const a = (i * 30) * Math.PI / 180;
        return { x1: 40 + Math.cos(a)*27, y1: 40 + Math.sin(a)*27, x2: 40 + Math.cos(a)*35, y2: 40 + Math.sin(a)*35 };
      });
      return (
        <svg width="64" height="64" viewBox="0 0 80 80" fill="none">
          {rays.map((r, i) => (
            <line key={i} x1={r.x1} y1={r.y1} x2={r.x2} y2={r.y2}
                  stroke={C.accent} strokeWidth="2" strokeLinecap="round" opacity="0.55"/>
          ))}
          <circle cx="40" cy="40" r="25" fill="rgba(91,95,239,0.18)" stroke={C.accent} strokeWidth="1.5"/>
          <circle cx="40" cy="40" r="19" fill="rgba(91,95,239,0.1)" stroke="rgba(91,95,239,0.35)" strokeWidth="1"/>
          <path d="M27 40 L36 49 L55 29"
                stroke={C.accent} strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    };

    /* ── Sidebar ── */
    function Sidebar({ tab, onSelect, collapsed, onToggle }) {
      const items = [
        { id: 0, label: 'My Plan', I: IconMyPlan },
        { id: 1, label: 'Learn',   I: IconLearn  },
        { id: 2, label: 'Wallet',  I: IconWallet },
      ];
      /* Text elements fade + shrink together */
      const txt = {
        overflow: 'hidden', whiteSpace: 'nowrap', flexShrink: 0,
        opacity:   collapsed ? 0 : 1,
        maxWidth:  collapsed ? '0px' : '180px',
        transition: collapsed
          ? 'opacity 80ms ease, max-width 220ms cubic-bezier(0.4,0,0.2,1)'
          : 'opacity 160ms ease 110ms, max-width 220ms cubic-bezier(0.4,0,0.2,1)',
      };
      const itemStyle = {
        justifyContent: collapsed ? 'center' : 'flex-start',
        padding: collapsed ? '10px 0' : '9px 12px',
        gap: collapsed ? '0' : '9px',
      };
      return (
        <div style={{
          width: collapsed ? '62px' : '220px',
          flexShrink: 0, background: C.sbBg, display: 'flex', flexDirection: 'column',
          borderRadius: '12px',
          border: '1px solid rgba(28,25,23,0.1)',
          boxShadow: '0 2px 12px rgba(0,0,0,0.07)',
          transition: 'width 220ms cubic-bezier(0.4,0,0.2,1)',
          overflow: 'hidden',
        }}>

          {/* Logo + collapse toggle in header */}
          <div style={{ padding: '16px 10px 14px', display: 'flex', alignItems: 'center', justifyContent: collapsed ? 'center' : 'space-between', gap: '8px', borderBottom: '1px solid rgba(28,25,23,0.08)', flexShrink: 0 }}>
            {!collapsed && (
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px', overflow: 'hidden', minWidth: 0 }}>
                <svg width="28" height="28" viewBox="0 0 100 100" style={{ flexShrink: 0 }}>
                  <circle cx="50" cy="50" r="50" fill="#2255D6"/>
                  <path fill="white" d="M86.4,71 A42,42 0 1,1 86.4,29 L79,29 L79,37.5 L71.7,37.5 A25,25 0 1,0 71.7,62.5 Z"/>
                </svg>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: '14px', fontWeight: '600', color: C.sbTxt, letterSpacing: '-0.2px' }}>Coursera</div>
                  <div style={{ fontSize: '10px', fontWeight: '600', color: C.accent, letterSpacing: '0.08em', marginTop: '1px' }}>LEARNER VIEW</div>
                </div>
              </div>
            )}
            <button onClick={onToggle} style={{ width: '22px', height: '22px', borderRadius: '6px', border: 'none', background: 'rgba(28,25,23,0.06)', color: C.sbMut, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 150ms ease', flexShrink: 0 }}>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d={collapsed ? 'M3 1 L7 5 L3 9' : 'M7 1 L3 5 L7 9'}
                      stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>

          {/* Nav items */}
          <div style={{ padding: '8px', flex: 1 }}>
            {items.map(({ id, label, I }) => (
              <button key={id} onClick={() => onSelect(id)}
                className={`nav-item${tab === id ? ' active' : ''}`}
                style={itemStyle} title={label}>
                <span style={{ display:'flex', flexShrink:0, filter: tab===id ? 'none' : 'saturate(0) opacity(0.35)', transition:'filter 150ms ease' }}><I active={true}/></span>
                <span style={txt}>{label}</span>
              </button>
            ))}
          </div>

          {/* User avatar */}
          <div style={{ padding: '10px 12px', borderTop: '1px solid rgba(28,25,23,0.08)', display: 'flex', alignItems: 'center', gap: '9px', flexShrink: 0 }}>
            <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: C.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: '700', color: '#fff', flexShrink: 0 }}>MC</div>
            <div style={txt}>
              <div style={{ fontSize: '13px', fontWeight: '500', color: C.sbTxt, lineHeight: '1.3' }}>Marcus Chen</div>
              <div style={{ fontSize: '11px', color: C.sbMut }}>Senior Data Analyst</div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Skill Tracker (Learn right panel, collapsible) ── */
    function SkillTracker({ collapsed = false, onToggle = () => {} }) {
      const [area, setArea]     = useState('prototyping');
      const [skill, setSkill]   = useState('workflow');
      const [navOpen, setNavOpen] = useState(false);

      const areas = [
        { id: 'prototyping', Ill: IllAIProto,    name: 'AI Prototyping',      status: 'active', pct: 42 },
        { id: 'data',        Ill: IllData,        name: 'Data Literacy',        status: 'active', pct: 68 },
        { id: 'strategy',    Ill: IllStrategy,    name: 'AI Strategy',          status: 'upnext', pct: 0  },
        { id: 'management',  Ill: IllManagement,  name: 'Management in AI Era', status: 'locked', pct: 0  },
      ];
      const skillsByArea = {
        prototyping: [
          { id: 'prompt',   name: 'Prompt Engineering',      sprint: 'Sprint 1', done: true,   pct: 100 },
          { id: 'workflow', name: 'AI Workflow Integration',  sprint: 'Sprint 2', active: true, pct: 15  },
          { id: 'api',      name: 'Claude API Fundamentals',  sprint: 'Sprint 3', pct: 0 },
          { id: 'proto',    name: 'Prototyping & Iteration',  sprint: 'Sprint 4', pct: 0 },
        ],
        data: [
          { id: 'sql',    name: 'SQL & Data Querying',    sprint: 'Sprint 1', done: true,   pct: 100 },
          { id: 'viz',    name: 'Data Visualization',     sprint: 'Sprint 2', done: true,   pct: 100 },
          { id: 'stats',  name: 'Statistical Analysis',   sprint: 'Sprint 3', active: true, pct: 45  },
          { id: 'python', name: 'Python for Data',        sprint: 'Sprint 4', pct: 0 },
        ],
        strategy: [
          { id: 'roi',     name: 'ROI Frameworks',    sprint: 'Sprint 1', pct: 0 },
          { id: 'risk',    name: 'AI Risk Assessment', sprint: 'Sprint 2', pct: 0 },
          { id: 'org',     name: 'Org Readiness',      sprint: 'Sprint 3', pct: 0 },
          { id: 'roadmap', name: 'AI Roadmapping',     sprint: 'Sprint 4', pct: 0 },
        ],
        management: [
          { id: 'change',  name: 'Change Management',    sprint: 'Sprint 1', pct: 0 },
          { id: 'team',    name: 'Team Dynamics',         sprint: 'Sprint 2', pct: 0 },
          { id: 'perf',    name: 'Performance in AI Era', sprint: 'Sprint 3', pct: 0 },
          { id: 'culture', name: 'AI Culture Building',   sprint: 'Sprint 4', pct: 0 },
        ],
      };
      const comps = [
        { ok: true,  label: 'Role defined clearly' },
        { ok: true,  label: 'Tone specified (skeptical)' },
        { ok: true,  label: 'Domain expertise established' },
        { ok: false, label: 'Output format instructions' },
        { ok: false, label: 'Behavior under uncertainty' },
        { ok: false, label: 'Escalation behavior' },
      ];
      const steps = [
        { label: 'Write a system prompt',       done: true  },
        { label: 'Chain 2 prompts in sequence', done: false },
        { label: 'Debug a failing prompt',      done: false },
        { label: 'Live assessment (≈ 15 min)',  done: false },
      ];

      const done     = comps.filter(c => c.ok).length;
      const compPct  = done / comps.length;
      const r = 28, circ = 2 * Math.PI * r;

      const currentSkills   = skillsByArea[area] || [];
      const currentAreaObj  = areas.find(a => a.id === area);
      const currentSkillObj = currentSkills.find(s => s.id === skill) || currentSkills[0];

      function switchArea(id) {
        const s = skillsByArea[id];
        setArea(id);
        const active = s.find(x => x.active) || s[0];
        if (active) setSkill(active.id);
      }

      return (

    }

    /* ── Arc ── */

    /* ── Skill Chart — admin style ── */
    function SkillChart() {
      const [hoverIdx, setHoverIdx] = React.useState(null);
      const svgRef = React.useRef(null);

      const MONTHS  = ['APR','MAY','JUN','JUL','AUG','SEP','OCT'];
      const aiPts   = [1, 2, 2, 3, 3, 4, 5];
      const techPts = [0, 0, 1, 2, 2, 3, 4];

      const SVW=560, SVH=170, SPL=22, SPR=44, SPT=14, SPB=26;
      const spW = SVW-SPL-SPR, spH = SVH-SPT-SPB;
      const maxV = 6;
      const sxP = (i) => SPL + (i/(MONTHS.length-1))*spW;
      const syP = (v) => SPT + spH - (v/maxV)*spH;

      const smkPath = (pts) => {
        let d = `M ${sxP(0).toFixed(1)} ${syP(pts[0]).toFixed(1)}`;
        for (let i=1; i<pts.length; i++) {
          const cx = ((sxP(i-1)+sxP(i))/2).toFixed(1);
          d += ` C ${cx} ${syP(pts[i-1]).toFixed(1)} ${cx} ${syP(pts[i]).toFixed(1)} ${sxP(i).toFixed(1)} ${syP(pts[i]).toFixed(1)}`;
        }
        return d;
      };

      const handleMove = (e) => {
        const svg = svgRef.current; if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) * (SVW / rect.width);
        let best=0, bestD=Infinity;
        MONTHS.forEach((_,i) => { const d=Math.abs(svgX-sxP(i)); if(d<bestD){bestD=d;best=i;} });
        setHoverIdx(bestD<48 ? best : null);
      };

      return (
        <div style={{ background: C.canvas, borderRadius:'16px', padding:'22px 26px 18px', border:`1px solid rgba(28,25,23,0.07)`, position:'relative' }}>
          {/* Summary */}
          <div style={{ marginBottom:'14px' }}>
            <div style={{ fontSize:'22px', fontWeight:'700', color:C.tPri, letterSpacing:'-0.025em', lineHeight:'1.2', marginBottom:'4px' }}>
              5 skills verified — you're ahead of pace.
            </div>
            <div style={{ fontSize:'11.5px', color:C.tMut }}>Apr → Oct 2026 · Skills verified over time</div>
          </div>
          {/* Legend */}
          <div style={{ display:'flex', gap:'14px', marginBottom:'8px' }}>
            {[{color:C.accent,label:'AI Skills'},{color:C.warm,label:'Technical'}].map(({color,label}) => (
              <div key={label} style={{ display:'flex', alignItems:'center', gap:'5px' }}>
                <svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>
                <span style={{ fontSize:'10.5px', color:C.tMut }}>{label}</span>
              </div>
            ))}
          </div>
          {/* SVG */}
          <div style={{ position:'relative' }}>
            <svg ref={svgRef} width="100%" viewBox={`0 0 ${SVW} ${SVH}`}
              style={{ display:'block', overflow:'visible', cursor:'crosshair' }}
              onMouseMove={handleMove} onMouseLeave={() => setHoverIdx(null)}>

              {/* Grid */}
              {[0,2,4,6].map(v => (
                <g key={v}>
                  <line x1={SPL} y1={syP(v)} x2={SVW-SPR+8} y2={syP(v)}
                    stroke="rgba(28,25,23,0.07)" strokeWidth={v===0?0.8:0.5} strokeDasharray={v===0?'none':'3 8'}/>
                  <text x={SPL-5} y={syP(v)+3.5} textAnchor="end" fill="rgba(28,25,23,0.3)"
                    fontSize="8" fontFamily="system-ui,sans-serif">{v}</text>
                </g>
              ))}

              {/* NOW marker */}
              <line x1={sxP(6)} y1={SPT-4} x2={sxP(6)} y2={SVH-SPB+4}
                stroke="rgba(28,25,23,0.1)" strokeWidth="1" strokeDasharray="3 5"/>
              <rect x={sxP(6)-14} y={SPT-16} width="28" height="12" rx="3" fill="rgba(28,25,23,0.07)"/>
              <text x={sxP(6)} y={SPT-6} textAnchor="middle" fill="rgba(28,25,23,0.45)"
                fontSize="6.5" fontWeight="600" letterSpacing="0.08em" fontFamily="system-ui,sans-serif">NOW</text>

              {/* Technical line */}
              <path d={smkPath(techPts)} stroke={C.warm} strokeWidth="2"
                fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>

              {/* AI Skills line */}
              <path d={smkPath(aiPts)} stroke={C.accent} strokeWidth="2.5"
                fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.92"/>

              {/* End dots + values */}
              <circle cx={sxP(6)} cy={syP(aiPts[6])}   r="4.5" fill={C.accent}  stroke="#fff" strokeWidth="2"/>
              <text x={sxP(6)+9} y={syP(aiPts[6])+3.5}   fill={C.tPri} fontSize="8.5" fontWeight="700" fontFamily="system-ui,sans-serif">{aiPts[6]}</text>
              <circle cx={sxP(6)} cy={syP(techPts[6])} r="4.5" fill={C.warm} stroke="#fff" strokeWidth="2"/>
              <text x={sxP(6)+9} y={syP(techPts[6])+3.5} fill={C.tPri} fontSize="8.5" fontWeight="700" fontFamily="system-ui,sans-serif">{techPts[6]}</text>

              {/* Hover crosshair */}
              {hoverIdx !== null && (
                <line x1={sxP(hoverIdx)} y1={SPT} x2={sxP(hoverIdx)} y2={SVH-SPB}
                  stroke="rgba(28,25,23,0.18)" strokeWidth="1"/>
              )}

              {/* X-axis months — ALL CAPS */}
              {MONTHS.map((m,i) => (
                <text key={m} x={sxP(i)} y={SVH-SPB+16} textAnchor="middle"
                  fill={i===6 ? C.tPri : 'rgba(28,25,23,0.38)'}
                  fontSize="8.5" fontWeight={i===6?'600':'400'}
                  fontFamily="system-ui,sans-serif">{m}</text>
              ))}
            </svg>

            {/* Hover tooltip */}
            {hoverIdx !== null && (() => {
              const left = Math.min(Math.max(sxP(hoverIdx)/SVW*100, 10), 78);
              return (
                <div style={{ position:'absolute', top:'6px', left:`${left}%`,
                  background:'white', borderRadius:'10px', padding:'10px 14px',
                  boxShadow:'0 4px 20px rgba(0,0,0,0.12)', minWidth:'140px',
                  pointerEvents:'none', zIndex:20, border:`1px solid rgba(28,25,23,0.06)` }}>
                  <div style={{ fontSize:'10.5px', color:C.tMut, marginBottom:'8px', fontWeight:'500' }}>
                    {MONTHS[hoverIdx].charAt(0)+MONTHS[hoverIdx].slice(1).toLowerCase()} 2026
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'5px' }}>
                    <span style={{ background:C.accent, color:'white', fontSize:'13px', fontWeight:'700', padding:'2px 8px', borderRadius:'5px' }}>{aiPts[hoverIdx]}</span>
                    <span style={{ fontSize:'11px', color:C.tSec }}>AI skills</span>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                    <span style={{ background:C.warm, color:'white', fontSize:'13px', fontWeight:'700', padding:'2px 8px', borderRadius:'5px' }}>{techPts[hoverIdx]}</span>
                    <span style={{ fontSize:'11px', color:C.tSec }}>Technical skills</span>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      );
    }

              <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'10px' }}>

                  background: sk.mcp.sessions > 0 ? '#27C93F' : C.tMut,

                  Claude MCP · {sk.mcp.sessions > 0 ? `${sk.mcp.sessions} sessions` : 'No sessions yet'}
                </div>
              </div>
              {sk.mcp.quote ? (
                <>
                  <div style={{ padding:'9px 11px', background:C.canvas, borderRadius:'7px', border:`1px solid ${C.border}`, fontSize:'11px', color:C.tSec, fontStyle:'italic', lineHeight:'1.65', marginBottom:'8px' }}>
                    "{sk.mcp.quote}"
                  </div>
                  {sk.mcp.usage && (
                    <div style={{ display:'flex', gap:'6px', alignItems:'flex-start' }}>

              ) : (
                <span style={{ fontSize:'11.5px', color:C.tMut, fontStyle:'italic' }}>
                  {sk.mcp.sessions === 0 ? 'Start the lab to connect via MCP' : sk.mcp.usage}

              )}
            </div>
            {/* Learning */}
            <div style={{ padding:'14px 16px' }}>
              <div style={{ fontSize:'10px', fontWeight:'600', color:C.tMut, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:'10px' }}>Learning</div>

              {sk.learning.score && (
                <div style={{ fontSize:'11.5px', color:C.tMut }}>Assessment: {sk.learning.score}</div>

          </div>
          {/* Workday signal */}
          {sk.workday && (

      );
    }

    /* ── Vignette 3: Wallet ── */

    /* ── App ── */
    function App() {
      const [tab, setTab] = useState(0);
      const [collapsed, setCollapsed] = useState(true);
      const [justVerified, setJustVerified] = useState(false);
      return (
        <div style={{ height:'100vh', display:'flex', background:C.canvas, padding:'8px', gap:'8px', boxSizing:'border-box' }}>
          <Sidebar tab={tab} onSelect={setTab} collapsed={collapsed} onToggle={() => setCollapsed(c => !c)}/>
          <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
            {tab===0 && <VignetteMyPlan  onStart={() => setTab(1)}/>}
            {tab===1 && <VignetteLearn   onSubmit={() => { setJustVerified(true); setTab(2); }}/>}
            {tab===2 && <VignetteWallet  key={String(justVerified)} justVerified={justVerified} onDismiss={() => setJustVerified(false)}/>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
