<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coursera Skills OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F4F1;
      color: #1C1917;
      -webkit-font-smoothing: antialiased;
    }
    textarea, input, button { font-family: inherit; }
    @keyframes blink   { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes slideUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes mcpPulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.85); } }

    .scroll { overflow-y: auto; overflow-x: hidden; }
    .scroll::-webkit-scrollbar { width: 4px; }
    .scroll::-webkit-scrollbar-track { background: transparent; }
    .scroll::-webkit-scrollbar-thumb { background: #E8E5E0; border-radius: 2px; }

    /* ── Cards ── */
    .card {
      background: #FFFFFF;
      border-radius: 12px;
      border: 1px solid rgba(28,25,23,0.07);
      box-shadow: 0 0 0 1px rgba(28,25,23,0.04), 0 1px 3px rgba(0,0,0,0.05), 0 3px 8px rgba(0,0,0,0.04);
      transition: box-shadow 150ms cubic-bezier(0.4,0,0.2,1), background 150ms cubic-bezier(0.4,0,0.2,1), transform 150ms cubic-bezier(0.4,0,0.2,1);
    }
    .card:hover { box-shadow: 0 0 0 1px rgba(28,25,23,0.06), 0 4px 14px rgba(0,0,0,0.09), 0 8px 24px rgba(0,0,0,0.05); background: #FAFAF8; }
    .card-static { background: #FFFFFF; border-radius: 12px; border: 1px solid rgba(28,25,23,0.07); box-shadow: 0 0 0 1px rgba(28,25,23,0.04), 0 1px 3px rgba(0,0,0,0.05); }

    /* ── Buttons ── */
    .btn {
      border: none; font-family: inherit; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 120ms cubic-bezier(0.4,0,0.2,1);
    }
    .btn:hover  { transform: translateY(-1px); filter: brightness(1.06); }
    .btn:active { transform: scale(0.98); filter: brightness(0.96); }
    .btn-primary { background: #1C1917; color: #FFFFFF; border-radius: 8px; }
    .btn-accent  { background: #5B5FEF; color: #FFFFFF; border-radius: 8px; }

    /* ── Sidebar nav ── */
    .nav-item {
      position: relative; width: 100%; text-align: left; border: none;
      padding: 9px 12px; border-radius: 8px;
      display: flex; align-items: center; gap: 9px;
      background: transparent; color: #78716C;
      font-size: 13px; font-weight: 400; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 150ms cubic-bezier(0.4,0,0.2,1), color 150ms cubic-bezier(0.4,0,0.2,1);
    }
    .nav-item:hover { background: rgba(28,25,23,0.05); color: #1C1917; }
    .nav-item.active { background: rgba(28,25,23,0.07); color: #1C1917; font-weight: 500; }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
      width: 2.5px; background: #5B5FEF; border-radius: 0 2px 2px 0;
    }

    /* ── Vignette transition ── */
    @keyframes vignetteIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .vignette { animation: vignetteIn 260ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    /* ── Verify card ── */
    @keyframes scaleIn   { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    @keyframes glowPulse {
      0%   { box-shadow: 0 0 0 2px #5B5FEF, 0 0 28px rgba(91,95,239,.50), 0 12px 40px rgba(0,0,0,.35); }
      50%  { box-shadow: 0 0 0 3px #5B5FEF, 0 0 48px rgba(91,95,239,.70), 0 12px 40px rgba(0,0,0,.35); }
      100% { box-shadow: 0 0 0 2px #5B5FEF, 0 0 18px rgba(91,95,239,.28), 0 12px 40px rgba(0,0,0,.35); }
    }
    .glow-card {
      animation: scaleIn 0.42s cubic-bezier(0.34,1.3,0.64,1) forwards,
                 glowPulse 1.6s ease-in-out 0.5s 1 forwards;
      box-shadow: 0 0 0 2px #5B5FEF, 0 0 18px rgba(91,95,239,.28), 0 12px 40px rgba(0,0,0,.35);
    }

    @keyframes fadeSlide { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:translateX(0); } }
    .fade-slide { animation: fadeSlide 0.22s ease-out forwards; }

    /* ── Confidence chips ── */
    .chip-conf {
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-family: inherit;
      transition: all 150ms cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Typography helpers ── */
    .label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .caption { font-size: 12px; color: #A8A29E; }

    textarea { resize: none; outline: none; }
    textarea:focus { border-color: #5B5FEF !important; }
  </style>
</head>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const C = {
      canvas:  '#F5F4F1',  surface: '#FFFFFF',  muted:  '#F0EDE8',
      border:  '#E8E5E0',  tPri:   '#1C1917',   tSec:   '#57534E',
      tMut:    '#A8A29E',  accent:  '#5B5FEF',  warm:   '#E76F3A',
      success: '#059669',  warning: '#D97706',   bg:     '#0A0A0F',
      sbBg:    '#ECEAE6',  sbMut:   '#78716C',  sbTxt:  '#1C1917',

    /* ── Marcus's 5 learning paths (5 Helix trigger journeys adapted to his context) ── */
    const LEARNERS = [
      /* ── Scenario 1: Atom — RCA (pull, small gap) ── */
      {
        id:'marcus-rca', name:'Marcus Chen', initials:'MC', color:'#5B5FEF',
        role:'People Manager', company:'B2B SaaS',
        learn:{
          breadcrumb:['Customer Success','Support Operations','RCA Lab'],
          headlines:{ write:"Today you're writing a root cause analysis for a support escalation.", feedback:"Solid structure — one thing to sharpen before you send this.", lab:"Now apply it to your actual escalation." },
          mcp:null,
          task:{ company:'YOUR TEAM · DUE TODAY', promptLabel:'YOUR DRAFT · 5 WHYS', confidenceQ:'How clear is the root cause in your draft right now?', text:"Using the 5 Whys method, work through the root cause of the escalation you just got off a call about. Start with the customer-facing symptom — what did the customer actually experience? Work backward from there." },
          prompt:{ initial:"Customer-facing symptom:\nA tier-1 enterprise customer experienced a 6-day response delay, two incorrect escalations, and never received a follow-up confirmation.\n\nWhy did this happen? (Why 1)\nBecause the ticket was tagged as low priority on intake.\n\nWhy was it tagged low priority? (Why 2)\n...\n\nWhy 3: ...\nWhy 4: ...\nWhy 5: ...\n\nRoot cause: ...\n\nCorrective actions:\n1. [Action] · Owner: · Due:\n2. [Action] · Owner: · Due:", refined:"Customer-facing symptom:\nTier-1 enterprise customer: 6-day response delay, two incorrect escalations, no follow-up confirmation.\n\nWhy 1: Ticket tagged low priority on intake.\nWhy 2: Intake agent used account size as the only priority signal — not contract tier.\nWhy 3: Priority matrix doesn't include contract SLA tier as a field.\nWhy 4: Priority matrix was last updated 18 months ago, before tiered SLAs were introduced.\nWhy 5: No owner was assigned to keep the matrix current after the SLA rollout.\n\nRoot cause: An operational process (priority matrix) wasn't updated to reflect a commercial change (tiered SLAs), with no ownership assigned to maintain it.\n\nCorrective actions:\n1. Update priority matrix to include contract tier · Owner: Marcus · Due: EOW\n2. Assign ongoing quarterly ownership of priority matrix to CS Ops · Owner: Priya · Recurring\n3. Audit open tickets for misclassification · Owner: Full team · Due: EOD today\n\nCustomer communication: [draft a one-paragraph response to the customer]" },
          feedback:[{ ok:true, text:"5 Whys reaches a real root cause — a process failure with no owner, not a person." },{ ok:false, text:"Corrective actions need an owner and a due date on each line. Without both, they become suggestions." },{ ok:false, text:"Missing: customer communication. A complete RCA includes what you're telling the customer and when." }],
          lab:[{ title:'State the customer-facing symptom in one sentence', hint:'What did the customer experience? Not what went wrong internally — what did they see?' },{ title:'Ask Why five times', hint:'Each answer becomes the next Why. Stop when you hit a process or system failure — not a person.' },{ title:'Name the root cause', hint:'Usually: a missing owner, an outdated process, or a system that doesn\'t reflect current reality.' },{ title:'Write 2–3 corrective actions', hint:'Each needs an owner and a due date. If it doesn\'t have both, it won\'t happen.' },{ title:'Draft the customer communication', hint:'One paragraph: what happened, what we\'re doing, what we\'re changing so it doesn\'t happen again.' }],
          labIntro:"You'll work through today's actual escalation using the 5 Whys structure. Helix will flag when you're describing a symptom instead of a root cause — and ask one question when it needs more specificity.",
          labCovers:['Build the 5 Whys chain for today\'s escalation','Name the root cause','Write corrective actions with owners and due dates'],
          verify:{
            skill:'Root Cause Analysis', contentType:'Atom', level:'Foundational',
            artifact:'Completed RCA — root cause identified, 5 Whys traceable, corrective action with named owner and due date',
            rubric:['Root cause identified — not just the nearest symptom','5 Whys chain complete and traceable to a process failure','Corrective action: named owner + specific due date','Customer communication drafted'],
            assessedBy:'Helix Skills Framework · CS Support Operations rubric',
            orgSignal:{ dashboard:'Root cause analysis — verified, artifact available', wallet:'RCA / Structured problem analysis', vp:'Management capability readiness: +1 verified gap closed' },
            quote:'"Scored on the artifact — not the fact that he read the explainer."',
          },
          tracker:{ sectionLabel:'Support Operations', skillName:'Root Cause Analysis', progress:{ current:0, total:5 },
            competencies:[{ ok:false, label:'Symptom vs. root cause distinguished' },{ ok:false, label:'5 Whys chain complete' },{ ok:false, label:'Root cause names a process/system failure' },{ ok:false, label:'Corrective actions: owner + due date' },{ ok:false, label:'Customer communication drafted' }],
            steps:[{ label:'State the customer-facing symptom', done:false },{ label:'Complete 5 Whys chain', done:false },{ label:'Write corrective actions', done:false },{ label:'Draft customer communication', done:false }] },
        },
      },
      /* ── Scenario 2: Lesson — SBI Feedback (pull, medium gap) ── */
      {
        id:'marcus-sbi', name:'Marcus Chen', initials:'MC', color:'#5B5FEF',
        role:'People Manager', company:'B2B SaaS',
        learn:{
          breadcrumb:['People Management','Performance Conversations','Session 1'],
          headlines:{ write:"Today you're learning to make direct feedback land — without it blowing up.", feedback:"You have the structure. Here's what makes the difference in delivery.", lab:"Now write what you'd actually say in tomorrow's 1:1." },
          mcp:null,
          task:{ company:'YOUR 1:1 TOMORROW', promptLabel:'YOUR OPENING STATEMENT', confidenceQ:'How does this opening feel — too direct, about right, or still too soft?', text:"Using the SBI framework (Situation → Behavior → Impact), write the specific thing you want to say tomorrow. Start with the most direct version — don't soften it yet. We'll calibrate after." },
          prompt:{ initial:"What I want to say:\n\"You've been missing targets for two months and every time I try to bring it up, we end up talking about something else. I need you to understand this is serious.\"\n\n[Let's rewrite this as SBI...]\n\nSituation (specific instances, not 'lately'):\n\nBehavior (observable, not interpreted):\n\nImpact (on you, on the team, on the work):\n\nOpening question (ask, don't tell):", refined:"Situation:\n\"In our last three 1:1s — on [dates] — I brought up the missed targets each time. Each time we moved to other topics before we got to what needs to change.\"\n\nBehavior:\n\"When I name the missed targets, you tend to pivot to context — the pipeline, the workload — and I follow you there. We've spent less than five minutes on what specifically is going to be different.\"\n\nImpact:\n\"For me, it means I don't know if we see this the same way. For the team, two months without a correction plan is something I'll have to account for upward.\"\n\n→ Then stop talking. Ask: \"What's your read on where things stand?\"\n→ If they agree quickly: \"Tell me more about what 'working on it' looks like for you.\"\n→ If they deflect: \"I hear that context — and I want to stay on the specific pattern I'm seeing.\"" },
          feedback:[{ ok:true, text:"Situation is specific — named the last three 1:1s, not 'lately' or 'often'. That's observable." },{ ok:false, text:"Behavior section describes what you do (follow them to other topics), not what they do. Flip it: name their observable action, not your response to it." },{ ok:false, text:"After Impact, you need to stop and ask a question — not make another statement. The goal is for them to talk, not just hear." }],
          lab:[{ title:'Write the Situation — two specific instances', hint:'Date, context, what happened. No generalizations. \"Our last three 1:1s\" is better than \"recently.\"' },{ title:'Write the Behavior — what you observed them do', hint:'Observable actions, not interpretations. \"Pivoted to context after I named the target\" not \"got defensive.\"' },{ title:'Write the Impact — two levels', hint:'Impact on you (what you\'re uncertain about) and impact on the team or the work.' },{ title:'Write the opening question', hint:'After Impact, don\'t keep talking. \"What\'s your read on where things stand?\" — then stop.' },{ title:'Anticipate the deflection and write your response', hint:'If they pivot to context: \"I hear that — and I want to stay on the specific pattern I\'m seeing.\"' }],
          labIntro:"You'll write exactly what you're going to say tomorrow — in SBI format — then Helix will roleplay the direct report's response so you can practice holding the thread when they deflect.",
          labCovers:['Write your SBI script','Roleplay the deflection','Practice naming the pattern when they pivot'],
          verify:{
            skill:'Direct Performance Feedback', contentType:'Lesson', level:'Foundational',
            artifact:'Written SBI statement — opening script for tomorrow\'s 1:1, scored against the SBI rubric',
            rubric:['Situation: specific instances, not generalizations','Behavior: observable action, not a character judgment','Impact: named at two levels — on you, on the team','Ends with a question, not another statement'],
            assessedBy:'Helix Skills Framework · SBI Performance Conversation rubric',
            orgSignal:{ dashboard:'Direct performance feedback — SBI rubric score surfaced. Review gap "name what you\'re seeing" tagged as addressed with evidence.', wallet:'SBI / Performance observation delivery', vp:'Review gap "needs to name what he\'s seeing" — closed with evidence, not just completed.' },
            quote:'"The gap from his review is now tagged as addressed with evidence — not just completed."',
          },
          tracker:{ sectionLabel:'People Management', skillName:'SBI Feedback Delivery', progress:{ current:0, total:5 },
            competencies:[{ ok:false, label:'Situation is specific, not vague' },{ ok:false, label:'Behavior is observable, not interpreted' },{ ok:false, label:'Impact is named clearly' },{ ok:false, label:'Ends with a question, not a statement' },{ ok:false, label:'Holds the thread when direct report deflects' }],
            steps:[{ label:'Write your SBI script', done:false },{ label:'Identify the likely deflection', done:false },{ label:'Roleplay the conversation', done:false },{ label:'Debrief what worked', done:false }] },
        },
      },
      /* ── Scenario 3: Course — Data Narrative (push, from review feedback) ── */
      {
        id:'marcus-data', name:'Marcus Chen', initials:'MC', color:'#5B5FEF',
        role:'People Manager', company:'B2B SaaS',
        learn:{
          breadcrumb:['Google Data Analytics','Narrative Structure','Module 4'],
          headlines:{ write:"You don't need better writing. You need a mental model for how data and narrative interact.", feedback:"The structure is right. Here's what's still reading as anecdote.", lab:"Now restructure your last team update using context–conflict–resolution." },
          mcp:{ label:'What your review flagged · via Workday', intro:'Your performance review surfaced this pattern across <strong>your last four team updates</strong> sent upward:', observation:'"Marcus\'s team updates rely too much on gut feel and anecdote. When he reports up, I can\'t tell if things are on track or not." — Direct manager feedback, Q4 review', gap:"The gap isn't stylistic. You can't fix this by cleaning up the writing — the AI can't fix it either. You need a mental model for how data and narrative interact. That's different from writing 'more data-driven.' That's what we're addressing today." },
          task:{ company:'YOUR TEAM REPORTING', promptLabel:'YOUR DRAFT · CONTEXT–CONFLICT–RESOLUTION', confidenceQ:'How data-grounded does this feel compared to what you sent before?', text:"Take your last team update — the one you sent upward. Find the first claim that relies on gut feel or a qualitative word like 'things are going well.' Replace it using the context–conflict–resolution structure." },
          prompt:{ initial:"What I wrote:\n\"Things are going well on the team overall. Jamie has been struggling a bit but I think they're turning a corner. We had a tough week with two escalations but the team handled it well. I'm cautiously optimistic about Q4.\"\n\n[This is anecdote — let's find the structure...]\n\nContext (baseline + actual result, numbers only):\n\nConflict (where is the gap? who or what is creating it?):\n\nResolution (what's the plan? who owns it? when will you know it's working?)", refined:"Context:\nThe team closed 87% of assigned tickets in Q3, against a target of 90%. Two enterprise escalations in week 12 accounted for the shortfall — both resolved within SLA.\n\nConflict:\nJamie has missed individual targets in 6 of the last 8 weeks (72% vs. 85% team average). I've flagged this in three 1:1s. I haven't yet seen a change in output pattern.\n\nResolution:\nFor Q4: team-level target stays at 90%. Jamie starts a 4-week performance plan in week 1 — I'll report progress at the next manager check-in. No other team members are trending below target.\n\nDecision point: If Jamie is not at 80%+ by week 4 of the plan, I'll escalate to HR. I'll flag proactively if we're heading that direction." },
          feedback:[{ ok:true, text:"Context is specific — 87% vs. 90%, two escalations named as the cause. That's a data observation, not anecdote." },{ ok:false, text:"Conflict names the gap but not the trajectory. 'Missed targets in 6 of 8 weeks' is good — is it getting better or worse week-over-week?" },{ ok:false, text:"Resolution needs a decision point, not just a plan. When will you know the performance plan is working? What's the signal that tells you to escalate?" }],
          lab:[{ title:'Open your last team update', hint:'The one you sent to your manager — not an internal team message' },{ title:'Find the first qualitative claim', hint:"Look for: 'things are going well,' 'the team is engaged,' 'cautiously optimistic' — anything without a number" },{ title:'Write the Context', hint:'What is the baseline? What was the target? What actually happened? Numbers only.' },{ title:'Write the Conflict', hint:'Where is the gap? Who or what is creating it? Be specific — name the person or process.' },{ title:'Write the Resolution + decision point', hint:"What's the plan? Who owns it? When will you know it's working — and what's the trigger to escalate?" }],
          labIntro:"You'll take your actual last team update — the one your manager read — and restructure it using context–conflict–resolution. Helix identifies the anecdote-to-data swaps and flags when the narrative still relies on qualitative signals.",
          labCovers:['Find the first anecdote in your update','Replace it with context–conflict–resolution','Add the decision point that tells you whether the plan is working'],
          verify:{
            skill:'Data-Backed Team Narrative', contentType:'Course', level:'Foundational',
            artifact:'Restructured team update — real document, context–conflict–resolution, data before recommendation',
            rubric:['Data appears before the recommendation','Context–conflict–resolution structure present','Claims grounded in numbers, not qualitative signals','Decision point explicitly named with a trigger'],
            assessedBy:'Google Data Analytics Certificate · Helix Augmented Behavioral Assessment',
            orgSignal:{ dashboard:'Data storytelling — Google certified + behavioral assessment passed. Two evidence types.', wallet:'Google Data Analytics cert + Structured data narrative — both verified, both portable', vp:'Review gap "reporting relies on anecdote" — closed with proof, not just completion. Partner cert + scored artifact.' },
            quote:'"Google cert alone is not sufficient — the behavioral output is required. Both travel with Marcus."',
          },
          tracker:{ sectionLabel:'Google Data Analytics', skillName:'Team Performance Narrative', progress:{ current:0, total:6 },
            competencies:[{ ok:false, label:'Claims are data-grounded, not qualitative' },{ ok:false, label:'Context: baseline + actual result' },{ ok:false, label:'Conflict names the specific person or process' },{ ok:false, label:'Resolution has owner + timeline' },{ ok:false, label:'Decision point is explicit' },{ ok:false, label:'Manager can track without asking clarifying questions' }],
            steps:[{ label:'Find the first anecdote in your last update', done:false },{ label:'Write context–conflict–resolution', done:false },{ label:'Add decision point and trigger', done:false },{ label:'Full team update restructured', done:false }] },
        },
      },
      /* ── Scenario 4: Path — Performance Review Cycle (push, onboarding assessment) ── */
      {
        id:'marcus-path', name:'Marcus Chen', initials:'MC', color:'#5B5FEF',
        role:'People Manager', company:'B2B SaaS',
        learn:{
          breadcrumb:['Performance Review Cycle','Goal Setting','Week 1 of 6'],
          headlines:{ write:"This is three distinct skills. We'll sequence them in the order you'll actually need them.", feedback:"Good start on goals. Here's what to tighten before your 1:1s.", lab:"Now map your six-week timeline and identify where each node lands." },
          mcp:{ label:'What your onboarding assessment flagged', intro:'Your Helix onboarding assessment — completed in month one — flagged <strong>three separate skill gaps</strong>:', observation:'"Goal-setting frameworks: not demonstrated. Developmental feedback delivery: not demonstrated. Data-backed reporting to leadership: not demonstrated." — Helix onboarding assessment', gap:"These don't come from the same course. We'll build a path that sequences them in the order the review cycle actually requires: goals first, then feedback, then reporting." },
          task:{ company:'YOUR TEAM · REVIEW CYCLE', promptLabel:'YOUR GOALS DRAFT · Q3', confidenceQ:'How specific and measurable are these goals right now?', text:"Start with Node 1: Goal Setting. For each of your four direct reports, draft one Q3 goal using SMART format. Write the goals below — we'll review them together before your first 1:1." },
          prompt:{ initial:"My four direct reports — Q3 goals (draft):\n\n1. [Name] · [Role]: Goal:\n2. [Name] · [Role]: Goal:\n3. [Name] · [Role]: Goal:\n4. [Name] · [Role]: Goal:\n\n---\nPath overview:\nNode 1 · Goal Setting → this session\nNode 2 · Developmental Feedback (SBI) → Week 2\nNode 3 · Data Narrative (Google Analytics) → Week 3–4\nNode 4 · Leadership Presentation → Week 5–6", refined:"1. Jamie (CS Manager): Increase individual ticket close rate from 72% to 85% by end of Q3 — measured weekly in the CS dashboard.\n2. Priya (CS Manager): Lead two enterprise onboarding cycles end-to-end without escalation — measured by escalation log and 30-day NPS.\n3. Lena (CS Specialist): Reduce average first-response time for standard tickets from 6h to 3h — measured in Zendesk weekly report.\n4. Tom (CS Specialist): Complete advanced Zendesk certification AND ship one workflow improvement to the team queue — measured by cert completion + PR merged by week 8.\n\nNote on Tom: two separate outcomes in one goal. If one is done and one isn't, I can't assess it cleanly. Need to split or weight.\n\nPath timeline:\nWeek 1–2: Goal-setting 1:1s with all four direct reports.\nWeek 3: SBI feedback in mid-cycle check-ins (I've done the SBI lesson — starting at the practice step).\nWeek 4: Restructure mid-cycle team update using context–conflict–resolution.\nWeek 6: Leadership presentation — team results to my manager." },
          feedback:[{ ok:true, text:"Jamie's goal is well-formed — specific, measurable, timebound, with a named tracking system." },{ ok:false, text:"Tom's goal has two outcomes. Split them or weight them — otherwise you can't assess the goal if one is done and one isn't." },{ ok:false, text:"Missing: each goal needs a mid-cycle check-in point. Without a Week 3 marker, you'll have a surprise at Week 6." }],
          lab:[{ title:'Draft Q3 goals for all four direct reports', hint:'SMART: Specific, Measurable, Achievable, Relevant, Time-bound. One goal each to start.' },{ title:'Check: does each goal have a tracking system?', hint:'Not just "I\'ll track it" — name the dashboard, spreadsheet, or log.' },{ title:'Map the six-week review timeline', hint:'Goals → 1:1s (Week 1–2) → SBI check-ins (Week 3) → mid-cycle update (Week 4) → leadership presentation (Week 6)' },{ title:'Identify your Node 2 entry point', hint:"Have you done the SBI lesson? If yes, you're starting at the practice step, not the framework." },{ title:'Draft one mid-cycle 1:1 agenda', hint:'15 min: goal progress (data), one SBI observation, one question (what do you need from me?)' }],
          labIntro:"You'll build your complete six-week review cycle plan — starting with Q3 goals today, then sequencing the feedback and reporting nodes in the order you'll actually need them.",
          labCovers:['Draft SMART goals for all four direct reports','Map the six-week review timeline','Identify your entry point for each path node'],
          verify:{
            skill:'Performance Review Cycle', contentType:'Path', level:'Practitioner',
            artifact:'Q3 goals doc + SBI feedback script + team readiness summary — all three scored against a single standardized rubric',

            <div style={{flex:1,padding:'14px',overflow:'auto'}}>
              <div style={{padding:'10px 12px',background:'rgba(255,140,0,0.07)',border:`1px solid rgba(255,140,0,0.18)`,borderRadius:'7px',marginBottom:'10px'}}>
                <div style={{fontSize:'11px',color:ORANGE,fontWeight:'700',marginBottom:'4px',fontFamily:'Inter,sans-serif'}}>⚠ Risk Verdict: MEDIUM</div>
                <div style={{fontSize:'11px',color:MUT,lineHeight:'1.7',fontFamily:'Inter,sans-serif'}}>Revenue-to-expense 14% deviation from Q2 baseline. COGS +18% QoQ, AR aging >90d on $284K, OpEx misallocation $42K.</div>

      const screens = [screen0, screen1, screen2, screen3, screen4];

      return (

              </svg>
              <div style={{marginTop:'auto',marginBottom:'10px'}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="3" stroke={step===1||step===2?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.22)'} strokeWidth="1.5"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                    stroke={step===1||step===2?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.22)'} strokeWidth="1.5" fill="none"/>

    /* ── Coursera MCP Widget ── */
    function CourseraWidget({ step, onAdvance, onComplete }) {
      const [minimized, setMinimized] = React.useState(false);
      const [tipVisible, setTipVisible] = React.useState(false);
      const [showVideo, setShowVideo] = React.useState(false);
      const [videoPlaying, setVideoPlaying] = React.useState(false);
      const [chatOpen, setChatOpen] = React.useState(false);
      const [chatQ, setChatQ] = React.useState('');
      const [chatA, setChatA] = React.useState(null);
      const [chatLoading, setChatLoading] = React.useState(false);
      const inputRef = React.useRef(null);

      React.useEffect(() => {
        setTipVisible(false);
        setShowVideo(false);
        setVideoPlaying(false);
        const t = setTimeout(() => setTipVisible(true), 1400);
        return () => clearTimeout(t);
      }, [step]);

      React.useEffect(() => {
        if (chatOpen && inputRef.current) inputRef.current.focus();
      }, [chatOpen]);

      const getResponse = (q, stepIdx) => {
        const lq = q.toLowerCase();
        if (lq.includes('system prompt') || lq.includes('what is') || lq.includes('explain')) {
          return "A system prompt is a persistent instruction set that shapes every AI response in a project. Instead of re-explaining your role each query, you define it once — role, output format, assumptions — and it applies automatically.";
        }
        if (lq.includes('stuck') || lq.includes("can't") || lq.includes("don't know") || lq.includes("help")) {
          const tips = [
            "No worries. Open Claude → create a new project called Meridian Analysis → you'll find the Instructions field in the project settings (gear icon).",
            "Make sure you're inside a Claude project, not a regular chat. The system prompt only persists in projects — that's what carries it across sessions.",
            "Paste the refined prompt from your feedback session into the Instructions field. Keep it under 500 words — shorter is sharper."
          ];
          return tips[stepIdx % tips.length];
        }
        if (lq.includes('rules') || lq.includes('settings') || lq.includes('where')) {
          return "In Claude Desktop: click your project name in the left sidebar → gear icon → 'Instructions'. That's the system prompt for the entire project.";
        }
        if (lq.includes('verdict') || lq.includes('format') || lq.includes('structure')) {
          return 'Add this at the end of your prompt: "Lead every response with a risk verdict: Low / Medium / High. Then key findings. Then specific concerns." That structure is what makes output actionable.';
        }
        if (lq.includes('compare') || lq.includes('difference') || lq.includes('without')) {
          return "Run the same query — 'Review Q3 financials, flag anomalies' — once with your system prompt active, once with it cleared. The difference in specificity and format is the skill you just learned.";
        }
        return "The key thing for this step: keep your role definition in the system prompt and your actual task in the chat. That separation is what makes AI output consistently useful across an entire project.";
      };

      const submitChat = () => {
        if (!chatQ.trim()) return;
        const q = chatQ;
        setChatQ('');
        setChatLoading(true);
        setChatA(null);
        setTimeout(() => { setChatA(getResponse(q, step)); setChatLoading(false); }, 850);
      };

      const WIDGET_STEPS = [
        { label: 'Open Claude', tip: 'Open Claude and create a new project — or use your existing Meridian analysis folder.' },
        { label: 'Go to Settings → Rules for AI', tip: 'Press ⌘+Shift+J to open Settings, then click the "Rules for AI" tab. You\'ll see an empty panel.', hasVideo: true },
        { label: 'Paste your system prompt', tip: 'Paste the refined prompt from your feedback session. Click Save — it persists across all AI chats.', hasVideo: true },
        { label: 'Ask about Q3 financials', tip: 'Open a new AI chat and send exactly: "Review Q3 financials for Meridian — flag anomalies"' },
        { label: 'Compare: with vs without rules', tip: 'Clear your Rules for AI, run the same query, and observe how the response quality drops without the structured rules.' },
      ];
      const cur = WIDGET_STEPS[step] || WIDGET_STEPS[0];
      const isLast = step >= WIDGET_STEPS.length - 1;

      const CoursC = () => (
        <svg width="18" height="18" viewBox="0 0 100 100" style={{flexShrink:0}}>
          <circle cx="50" cy="50" r="50" fill="#2255D6"/>
          <path fill="white" d="M86.4,71 A42,42 0 1,1 86.4,29 L79,29 L79,37.5 L71.7,37.5 A25,25 0 1,0 71.7,62.5 Z"/>
        </svg>
      );

      if (minimized) return (
        <div style={{position:'absolute',bottom:'20px',right:'20px',display:'flex',gap:'8px',alignItems:'center',zIndex:10,animation:'slideUp 220ms ease both',fontFamily:'Inter,sans-serif'}}>
          {/* Ask anything pill */}
          <div onClick={() => { setMinimized(false); setChatOpen(true); }}
            style={{background:'rgba(10,10,20,0.95)',border:'1px solid rgba(91,95,239,0.45)',
              borderRadius:'22px',padding:'7px 14px',display:'flex',alignItems:'center',gap:'6px',
              cursor:'pointer',backdropFilter:'blur(12px)',boxShadow:'0 4px 24px rgba(0,0,0,0.5)'}}>
            <span style={{fontSize:'14px',lineHeight:1}}>✦</span>
            <span style={{fontSize:'11px',color:'rgba(255,255,255,0.65)',fontWeight:'500'}}>Ask anything</span>
          </div>
          {/* Step pill */}
          <div onClick={() => setMinimized(false)}
            style={{background:'rgba(10,10,20,0.95)',border:'1px solid rgba(91,95,239,0.45)',
              borderRadius:'22px',padding:'8px 14px 8px 10px',display:'flex',alignItems:'center',gap:'8px',
              cursor:'pointer',backdropFilter:'blur(12px)',boxShadow:'0 4px 24px rgba(0,0,0,0.5)'}}>
            <CoursC/>
            <div style={{width:'7px',height:'7px',borderRadius:'50%',background:'#27C93F',animation:'mcpPulse 2s ease-in-out infinite'}}/>
            <span style={{fontSize:'11px',color:'rgba(255,255,255,0.7)',fontWeight:'500'}}>Step {step+1} of {WIDGET_STEPS.length}</span>
            <span style={{fontSize:'9px',color:'rgba(255,255,255,0.3)'}}>▲</span>
          </div>
        </div>
      );

      return (
        <div style={{position:'absolute',bottom:'20px',right:'20px',width:'292px',
          background:'rgba(10,10,20,0.96)',border:'1px solid rgba(91,95,239,0.3)',
          borderRadius:'14px',overflow:'hidden',
          boxShadow:'0 8px 36px rgba(0,0,0,0.6)',
          backdropFilter:'blur(20px)',
          animation:'slideUp 280ms ease both',
          fontFamily:'Inter,sans-serif',zIndex:10}}>

          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:'9px',padding:'11px 13px 10px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
            <CoursC/>
            <div style={{flex:1}}>
              <div style={{fontSize:'12px',fontWeight:'600',color:'rgba(255,255,255,0.9)',marginBottom:'2px'}}>Coursera</div>
              <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
                <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'#27C93F',animation:'mcpPulse 2s ease-in-out infinite'}}/>
                <span style={{fontSize:'10px',color:'rgba(255,255,255,0.4)',letterSpacing:'0.02em'}}>MCP · watching session</span>
              </div>
            </div>
            <button onClick={() => setMinimized(true)}
              style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.28)',padding:'3px',display:'flex',alignItems:'center',transition:'color 150ms ease'}}
              onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.65)'}
              onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.28)'}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <line x1="3" y1="3" x2="11" y2="11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                <line x1="11" y1="3" x2="3" y2="11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </button>
          </div>

          {/* Progress */}
          <div style={{padding:'9px 13px 7px'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'5px'}}>
              <span style={{fontSize:'10px',fontWeight:'600',color:'rgba(255,255,255,0.35)',letterSpacing:'0.08em',textTransform:'uppercase'}}>Lab Progress</span>
              <span style={{fontSize:'10px',color:'rgba(255,255,255,0.35)'}}>{step+1} / {WIDGET_STEPS.length}</span>
            </div>
            <div style={{height:'3px',background:'rgba(255,255,255,0.07)',borderRadius:'2px',overflow:'hidden'}}>
              <div style={{width:`${((step+0.5)/WIDGET_STEPS.length)*100}%`,height:'100%',background:'#5B5FEF',borderRadius:'2px',transition:'width 400ms ease'}}/>
            </div>
          </div>

          {/* Step + tip */}
          <div style={{padding:'7px 13px 10px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
            <div style={{fontSize:'13px',fontWeight:'600',color:'rgba(255,255,255,0.88)',marginBottom:'5px',lineHeight:'1.35'}}>{cur.label}</div>
            {tipVisible && (
              <div style={{fontSize:'11.5px',color:'rgba(255,255,255,0.46)',lineHeight:'1.65',animation:'fadeUp 300ms ease both'}}>{cur.tip}</div>
            )}
          </div>

          {/* Video on demand */}
          {showVideo && (
            <div style={{padding:'10px 13px',borderBottom:'1px solid rgba(255,255,255,0.06)',animation:'fadeUp 250ms ease both'}}>
              <VideoTutorial playing={videoPlaying} onToggle={() => setVideoPlaying(v=>!v)}/>
            </div>
          )}

          {/* Actions */}
          <div style={{padding:'10px 13px 8px',display:'flex',flexDirection:'column',gap:'7px'}}>
            {isLast ? (
              <button onClick={onComplete}
                style={{padding:'10px 0',background:'#059669',border:'none',borderRadius:'8px',
                  fontSize:'13px',fontWeight:'700',color:'white',cursor:'pointer',
                  animation:'fadeUp 350ms ease both',fontFamily:'inherit',
                  transition:'filter 150ms ease'}}
                onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.1)'}
                onMouseLeave={e=>e.currentTarget.style.filter='none'}>
                Done — submit for verification →
              </button>
            ) : (
              <>
                <button onClick={onAdvance}
                  style={{padding:'9px 0',background:'#5B5FEF',border:'none',borderRadius:'8px',
                    fontSize:'12px',fontWeight:'600',color:'white',cursor:'pointer',
                    fontFamily:'inherit',transition:'filter 150ms ease'}}
                  onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.12)'}
                  onMouseLeave={e=>e.currentTarget.style.filter='none'}>
                  Mark done, next step →
                </button>
                <div style={{display:'flex',gap:'7px'}}>
                  <button
                    style={{flex:1,padding:'7px 0',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'7px',fontSize:'11px',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontFamily:'inherit'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'}
                    onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.06)'}>
                    Got it
                  </button>
                  {cur.hasVideo && (
                    <button onClick={() => setShowVideo(v=>!v)}
                      style={{flex:1,padding:'7px 0',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'7px',fontSize:'11px',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontFamily:'inherit'}}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'}
                      onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.06)'}>
                      {showVideo ? 'Hide video' : '▶ Tutorial'}
                    </button>
                  )}
                </div>
              </>
            )}
          </div>

          {/* Ask anything */}
          <div style={{borderTop:'1px solid rgba(255,255,255,0.07)',padding:'9px 13px 11px'}}>
            {chatA && (
              <div style={{marginBottom:'8px',padding:'9px 11px',
                background:'rgba(91,95,239,0.1)',border:'1px solid rgba(91,95,239,0.2)',
                borderRadius:'8px',fontSize:'11.5px',color:'rgba(255,255,255,0.72)',
                lineHeight:'1.62',animation:'fadeUp 250ms ease both'}}>
                {chatLoading
                  ? <span style={{color:'rgba(255,255,255,0.3)'}}>✦ thinking…</span>
                  : chatA}
              </div>
            )}
            {chatLoading && !chatA && (
              <div style={{marginBottom:'8px',padding:'9px 11px',
                background:'rgba(91,95,239,0.08)',border:'1px solid rgba(91,95,239,0.15)',
                borderRadius:'8px',fontSize:'11.5px',color:'rgba(255,255,255,0.3)',
                animation:'fadeUp 250ms ease both'}}>
                ✦ thinking…
              </div>
            )}
            {chatOpen ? (
              <div style={{display:'flex',gap:'6px'}}>
                <input ref={inputRef}
                  value={chatQ}
                  onChange={e => setChatQ(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') submitChat(); if (e.key === 'Escape') { setChatOpen(false); setChatQ(''); } }}
                  placeholder="Ask anything…"
                  style={{flex:1,background:'rgba(255,255,255,0.07)',
                    border:'1px solid rgba(255,255,255,0.15)',borderRadius:'7px',
                    padding:'7px 10px',fontSize:'11.5px',color:'rgba(255,255,255,0.88)',
                    fontFamily:'inherit',outline:'none'}}
                />
                <button onClick={submitChat}
                  style={{padding:'7px 11px',background:'#5B5FEF',border:'none',
                    borderRadius:'7px',fontSize:'13px',color:'white',cursor:'pointer',
                    fontFamily:'inherit',transition:'filter 150ms'}}>
                  →
                </button>
              </div>
            ) : (
              <button onClick={() => setChatOpen(true)}
                style={{width:'100%',padding:'7px 11px',
                  background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.09)',
                  borderRadius:'8px',display:'flex',alignItems:'center',gap:'7px',
                  cursor:'pointer',fontFamily:'inherit',transition:'background 150ms ease'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.08)'}
                onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.04)'}>
                <span style={{fontSize:'14px',color:'rgba(255,255,255,0.55)',lineHeight:1}}>✦</span>
                <span style={{fontSize:'11.5px',color:'rgba(255,255,255,0.38)'}}>Ask anything…</span>
              </button>
            )}
          </div>
        </div>
      );
    }

    /* ── Vignette 1: Learn (chat thread) ── */
    function VignetteLearn({ onSubmit, learner }) {
      const LL = learner?.learn || LEARNERS[0].learn;
      const [conf, setConf]               = useState('getting-there');
      const [promptText, setPromptText]   = useState(LL.prompt.initial);
      const [refinedText, setRefinedText] = useState(LL.prompt.refined);
      const [trackerCollapsed, setTrackerCollapsed] = useState(false);
      const [videoPlaying, setVideoPlaying] = useState(false);
      const [showTutorial, setShowTutorial] = useState(false);
      const [labMode, setLabMode]         = useState('steps');
      const [cursorStep, setCursorStep]   = useState(0);
      const [revealed, setRevealed]       = useState(1); // thread sections visible (1–9)
      const [focusId, setFocusId]         = useState(null); // full-screen focused section id
      const threadRef                     = useRef(null);

      // Streaming headline (runs once on mount / learner change)
      const [streamed, setStreamed] = useState('');
      const [hlDone, setHlDone]     = useState(false);
      useEffect(() => {
        setStreamed(''); setHlDone(false); setRevealed(1);
        const hl = LL.headlines.write;
        let i = 0, interval;
        const t0 = setTimeout(() => {
          const t1 = setTimeout(() => {
            interval = setInterval(() => {
              i += 2; setStreamed(hl.slice(0, i));
              if (i >= hl.length) {
                setStreamed(hl); clearInterval(interval); setHlDone(true);
                setTimeout(() => setRevealed(2), 400);
                setTimeout(() => setRevealed(3), 900);
                setTimeout(() => setRevealed(4), 1400);
              }
            }, 18);
          }, 200);
          return () => clearTimeout(t1);
        }, 120);
        return () => { clearTimeout(t0); clearInterval(interval); };
      }, [learner?.id]);

      // Auto-scroll thread to bottom when new section appears
      useEffect(() => {
        if (threadRef.current) setTimeout(() => threadRef.current.scrollTo({ top: threadRef.current.scrollHeight, behavior: 'smooth' }), 80);
      }, [revealed]);

      function reveal(n) { setTimeout(() => setRevealed(r => Math.max(r, n)), 0); setTimeout(() => setRevealed(r => Math.max(r, n+1)), 500); setTimeout(() => setRevealed(r => Math.max(r, n+2)), 1000); }

      // MCP card content (shared between thread and focused state)
      const McpCard = () => (
        <div style={{ borderRadius:'12px', border:`1px solid ${C.border}`, background:C.muted, borderTop:`2px solid ${C.accent}`, padding:'14px 16px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'7px' }}>
              {LL.mcp && <div style={{ width:'6px', height:'6px', borderRadius:'50%', background:'#27C93F', animation:'mcpPulse 2s ease-in-out infinite', flexShrink:0 }}/>}
              <span style={{ fontSize:'10px', fontWeight:'600', color:C.tMut, letterSpacing:'.09em', textTransform:'uppercase' }}>{LL.mcp ? LL.mcp.label : 'Personalize your learning'}</span>
            </div>
            {LL.mcp && <div style={{ display:'flex', alignItems:'center', gap:'4px', background:'rgba(5,150,105,0.07)', border:'1px solid rgba(5,150,105,0.2)', borderRadius:'20px', padding:'2px 8px', flexShrink:0 }}><svg width="8" height="10" viewBox="0 0 9 11" fill="none"><path d="M1.5 5V3.5a3 3 0 0 1 6 0V5M1 5h7a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-.5.5H1a.5.5 0 0 1-.5-.5v-4A.5.5 0 0 1 1 5z" stroke="#059669" strokeWidth="1.1" strokeLinecap="round"/></svg><span style={{ fontSize:'9px', fontWeight:'700', color:'#059669', letterSpacing:'.06em', textTransform:'uppercase' }}>Only visible to you</span></div>}
          </div>
          {LL.mcp ? (<><p style={{ fontSize:'13px', lineHeight:'1.7', color:C.tSec, marginBottom:'10px' }} dangerouslySetInnerHTML={{ __html:LL.mcp.intro }}/><div style={{ padding:'9px 12px', background:C.canvas, borderRadius:'8px', border:`1px solid ${C.border}`, fontSize:'12.5px', color:C.tSec, fontStyle:'italic', lineHeight:'1.65', marginBottom:'10px' }}>{LL.mcp.observation}</div><p style={{ fontSize:'13px', lineHeight:'1.7', color:C.tSec, margin:0 }} dangerouslySetInnerHTML={{ __html:LL.mcp.gap }}/></>)
          : (<div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'14px' }}><span style={{ fontSize:'12.5px', color:C.tMut }}>Personalize this further — connect your work tools or upload docs.</span><div style={{ display:'flex', gap:'6px', flexShrink:0 }}><button style={{ background:'transparent', border:`1px solid ${C.border}`, color:C.tSec, borderRadius:'7px', padding:'5px 10px', fontSize:'11.5px', cursor:'pointer', fontFamily:'inherit' }}>↑ Upload docs</button><button style={{ background:'transparent', border:`1px solid ${C.accent}`, color:C.accent, borderRadius:'7px', padding:'5px 10px', fontSize:'11.5px', fontWeight:'600', cursor:'pointer', fontFamily:'inherit' }}>Connect MCP</button></div></div>)}
        </div>
      );

      // Thread divider
      const Div = () => <div style={{ display:'flex', alignItems:'center', gap:12, margin:'32px 0' }}><div style={{ flex:1, height:1, background:C.border }}/><div style={{ width:5, height:5, borderRadius:'50%', background:C.border }}/><div style={{ flex:1, height:1, background:C.border }}/></div>;

      // Hover-to-focus wrapper
      function Section({ id, children }) {
        const [hov, setHov] = useState(false);
        return (
          <div style={{ position:'relative' }} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
            {children}
            {hov && (
              <button onClick={() => setFocusId(id)} style={{ position:'absolute', top:0, right:0, background:'rgba(28,25,23,0.06)', border:`1px solid ${C.border}`, borderRadius:7, padding:'4px 10px', fontSize:10, fontWeight:600, color:C.tMut, cursor:'pointer', fontFamily:'inherit', backdropFilter:'blur(4px)', display:'flex', alignItems:'center', gap:4, letterSpacing:'.04em' }}>
                ⤢ Focus
              </button>
            )}
          </div>
        );
      }

      // Breadcrumb
      const Breadcrumb = () => (
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:36 }}>
          {LL.breadcrumb.map((c,i) => (<React.Fragment key={i}>{i>0&&<span style={{ fontSize:11, color:'rgba(28,25,23,0.2)' }}>·</span>}<span style={{ fontSize:11, fontWeight:i===0?'600':i===1?'500':'400', color:C.tMut }}>{c}</span></React.Fragment>))}
        </div>
      );

      /* ── Full-screen focused overlay ── */
      if (focusId) {
        const back = () => setFocusId(null);
        return (
          <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
            <div className="scroll vignette" style={{ flex:1, background:C.surface, padding:'0' }}>
              <div style={{ position:'sticky', top:0, zIndex:10, padding:'14px 40px', borderBottom:`1px solid ${C.border}`, background:C.surface, display:'flex', alignItems:'center', gap:12 }}>
                <button onClick={back} style={{ background:'transparent', border:`1px solid ${C.border}`, borderRadius:8, padding:'6px 14px', fontSize:12.5, color:C.tMut, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:6 }}>← Back to thread</button>
                <span style={{ fontSize:11, color:C.tMut, letterSpacing:'.06em', textTransform:'uppercase' }}>Focused</span>
              </div>
              <div className="scroll" style={{ padding:'52px 0', display:'flex', justifyContent:'center' }}>
                <div style={{ width:'100%', maxWidth:640, padding:'0 40px' }}>
                  {focusId==='draft' && (<>
                    <div style={{ fontSize:11, fontWeight:600, color:C.tMut, letterSpacing:'.07em', textTransform:'uppercase', marginBottom:10 }}>{LL.task.promptLabel||'Your Draft'}</div>
                    <div style={{ fontSize:13.5, lineHeight:1.7, color:C.tSec, marginBottom:20 }}>{LL.task.text}</div>
                    <textarea value={promptText} onChange={e=>setPromptText(e.target.value)} autoFocus
                      style={{ width:'100%', height:280, padding:'16px 18px', border:`1.5px solid ${C.accent}`, borderRadius:12, fontSize:14.5, lineHeight:1.75, color:C.tPri, background:C.canvas, resize:'none', outline:'none', fontFamily:'inherit' }}/>
                    <div style={{ marginTop:16, display:'flex', gap:10, alignItems:'center' }}>
                      <button className="btn btn-primary" onClick={() => { back(); reveal(5); }} style={{ padding:'12px 24px', fontSize:13.5 }}>Submit →</button>
                      <span style={{ fontSize:12, color:C.tMut }}>{LL.task.confidenceQ}</span>
                    </div>
                  </>)}
                  {focusId==='refined' && (<>
                    <div style={{ fontSize:11, fontWeight:600, color:C.tMut, letterSpacing:'.07em', textTransform:'uppercase', marginBottom:10 }}>Refined — edit if you'd like</div>
                    <textarea value={refinedText} onChange={e=>setRefinedText(e.target.value)} autoFocus
                      style={{ width:'100%', height:320, padding:'16px 18px', border:`1.5px solid ${C.accent}`, borderRadius:12, fontSize:14.5, lineHeight:1.75, color:C.tPri, background:C.canvas, resize:'none', outline:'none', fontFamily:'inherit' }}/>
                    <button className="btn btn-primary" onClick={() => { back(); reveal(8); }} style={{ marginTop:16, padding:'12px 24px', fontSize:13.5 }}>Use this — start lab →</button>
                  </>)}
                  {focusId==='task' && (<>
                    <div style={{ fontSize:11, fontWeight:600, color:C.tMut, letterSpacing:'.09em', textTransform:'uppercase', marginBottom:10 }}>Your task · {LL.task.company}</div>
                    <p style={{ fontSize:18, lineHeight:1.75, color:C.tPri }}>{LL.task.text}</p>
                  </>)}
                  {focusId==='feedback' && LL.feedback.map((pt,i) => (
                    <div key={i} style={{ display:'flex', gap:14, padding:'16px 18px', borderRadius:10, background:pt.ok?'rgba(5,150,105,0.04)':'rgba(28,25,23,0.03)', border:`1px solid ${pt.ok?'rgba(5,150,105,0.15)':C.border}`, marginBottom:10 }}>
                      <span style={{ color:pt.ok?C.success:C.tMut, fontWeight:700, fontSize:14, flexShrink:0 }}>{pt.ok?'✓':'→'}</span>
                      <span style={{ fontSize:14.5, lineHeight:1.7, color:C.tSec }}>{pt.text}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <SkillTracker collapsed={trackerCollapsed} onToggle={() => setTrackerCollapsed(c=>!c)} trackerData={LL.tracker} simplified={true}/>
          </div>
        );
      }

      /* ── Tutorial screen ── */
      if (showTutorial) return (
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
          <div className="scroll vignette" style={{ flex:1, padding:'48px 56px', background:C.surface }}>
            <button onClick={() => setShowTutorial(false)} style={{ background:'none', border:'none', color:C.tMut, fontSize:13, cursor:'pointer', padding:0, marginBottom:24, display:'flex', alignItems:'center', gap:6, fontFamily:'inherit' }}>← Back</button>
            <div style={{ maxWidth:560 }}>
              <div style={{ marginBottom:16 }}><Sparkle/></div>
              <h2 style={{ fontSize:28, fontWeight:700, color:C.tPri, letterSpacing:'-0.025em', lineHeight:1.2, marginBottom:8 }}>Watch first, then do it.</h2>
              <p style={{ fontSize:14, color:C.tMut, marginBottom:28, lineHeight:1.65 }}>A 2-minute walkthrough of the lab steps — then you'll do it yourself.</p>
              <VideoTutorial playing={videoPlaying} onToggle={() => setVideoPlaying(v=>!v)}/>
              <div style={{ marginTop:24, padding:'14px 18px', background:C.canvas, borderRadius:10, border:`1px solid ${C.border}`, marginBottom:24 }}>
                <div style={{ fontSize:10, fontWeight:600, color:C.tMut, letterSpacing:'.08em', textTransform:'uppercase', marginBottom:10 }}>What the lab covers</div>
                {LL.labCovers.map((item,i) => (<div key={i} style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:i<LL.labCovers.length-1?8:0 }}><span style={{ color:C.success, fontSize:12, flexShrink:0, marginTop:2, fontWeight:700 }}>✓</span><span style={{ fontSize:13, color:C.tSec, lineHeight:1.55 }}>{item}</span></div>))}
              </div>
              <button className="btn btn-primary" onClick={() => { setShowTutorial(false); setCursorStep(0); setLabMode('cursor'); }} style={{ padding:'13px 28px', fontSize:14 }}>Launch lab →</button>
            </div>
          </div>
          <SkillTracker collapsed={trackerCollapsed} onToggle={() => setTrackerCollapsed(c=>!c)} trackerData={LL.tracker} simplified={true}/>
        </div>
      );

      /* ── Cursor lab (full-screen IDE) ── */
      if (labMode === 'cursor') return (
        <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
          <button onClick={() => setLabMode('steps')} style={{ position:'absolute', top:16, left:16, zIndex:20, background:'rgba(10,10,20,0.85)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:7, padding:'6px 12px', fontSize:11, fontWeight:500, color:'rgba(255,255,255,0.55)', cursor:'pointer', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', gap:5, fontFamily:'Inter,sans-serif', transition:'color 150ms' }} onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.9)'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.55)'}>← Back</button>
          <CursorIDE step={cursorStep}/>
          <CourseraWidget step={cursorStep} onAdvance={() => setCursorStep(s=>Math.min(s+1,4))} onComplete={onSubmit}/>
        </div>
      );

      /* ── Chat thread ── */
      return (
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
          <div ref={threadRef} className="scroll vignette" style={{ flex:1, background:C.surface, overflowY:'auto' }}>
            <div style={{ maxWidth:600, margin:'0 auto', padding:'48px 48px 100px' }}>
              <Breadcrumb/>

              {/* ① Headline */}
              <div style={{ marginBottom:28 }}>
                <div style={{ marginBottom:16 }}><Sparkle/></div>
                <h2 style={{ fontSize:36, fontWeight:700, color:C.tPri, letterSpacing:'-0.03em', lineHeight:1.2, minHeight:88 }}>
                  {streamed}{!hlDone && <span style={{ display:'inline-block', width:'2px', height:'32px', background:C.accent, marginLeft:2, verticalAlign:'middle', animation:'blink 0.9s step-end infinite' }}/>}
                </h2>
              </div>

              {/* ② MCP / personalize card */}
              {revealed >= 2 && (
                <div style={{ animation:'fadeUp 300ms ease forwards', marginBottom:0 }}>
                  <McpCard/>
                  <Div/>
                </div>
              )}

              {/* ③ Task */}
              {revealed >= 3 && (
                <div style={{ animation:'fadeUp 300ms ease forwards', marginBottom:0 }}>
                  <Section id="task">
                    <div style={{ fontSize:10, fontWeight:600, color:C.tMut, letterSpacing:'.09em', textTransform:'uppercase', marginBottom:10 }}>Your task · {LL.task.company}</div>
                    <p style={{ fontSize:15, lineHeight:1.75, color:C.tSec }}>{LL.task.text}</p>
                  </Section>
                  <Div/>
                </div>
              )}

              {/* ④ Draft input */}
              {revealed >= 4 && (
                <div style={{ animation:'fadeUp 300ms ease forwards' }}>
                  <Section id="draft">
                    <div style={{ fontSize:11, fontWeight:600, color:C.tMut, letterSpacing:'.07em', textTransform:'uppercase', marginBottom:10 }}>{LL.task.promptLabel||'Your Draft'}</div>
                    <textarea value={promptText} onChange={e=>setPromptText(e.target.value)}
                      style={{ width:'100%', height:130, padding:'14px 16px', border:`1px solid rgba(28,25,23,0.12)`, borderRadius:10, fontSize:13.5, lineHeight:1.7, color:C.tPri, background:C.canvas, resize:'none', outline:'none', fontFamily:'inherit', transition:'border-color 150ms' }}
                      onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor='rgba(28,25,23,0.12)'}/>
                    {revealed < 5 && (
                      <div style={{ marginTop:18 }}>
                        <div style={{ fontSize:13, color:C.tMut, marginBottom:10 }}>{LL.task.confidenceQ||'How does this feel right now?'}</div>
                        <div style={{ display:'flex', gap:8, marginBottom:18 }}>
                          {[{id:'not-yet',l:'Not yet'},{id:'getting-there',l:'Getting there'},{id:'got-it',l:"I've got it"}].map(chip => { const a=conf===chip.id; return <button key={chip.id} onClick={()=>setConf(chip.id)} style={{ border:`1px solid ${a?C.tPri:'rgba(28,25,23,0.14)'}`, background:a?C.tPri:'transparent', fontWeight:a?600:400, color:a?'#fff':C.tMut, borderRadius:8, padding:'7px 14px', fontSize:12.5, cursor:'pointer', fontFamily:'inherit', transition:'all 150ms' }}>{chip.l}</button>; })}
                        </div>
                        <button className="btn btn-primary" onClick={() => reveal(5)} style={{ padding:'12px 24px', fontSize:13.5 }}>Submit →</button>
                      </div>
                    )}
                  </Section>
                </div>
              )}

              {/* ⑤ Feedback headline */}
              {revealed >= 5 && (
                <div style={{ animation:'fadeUp 300ms ease forwards' }}>
                  <Div/>
                  <div style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:20 }}>
                    <div style={{ width:26, height:26, borderRadius:7, background:C.accent, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:800, color:'#fff', flexShrink:0, marginTop:4 }}>H</div>
                    <h3 style={{ fontSize:26, fontWeight:700, color:C.tPri, letterSpacing:'-0.025em', lineHeight:1.25 }}>{LL.headlines.feedback}</h3>
                  </div>
                </div>
              )}

              {/* ⑥ Feedback items */}
              {revealed >= 6 && (
                <div style={{ animation:'fadeUp 300ms ease forwards', marginBottom:8 }}>
                  <Section id="feedback">
                    {LL.feedback.map((pt,i) => (
                      <div key={i} style={{ display:'flex', gap:12, marginBottom:8, padding:'13px 15px', borderRadius:10, background:pt.ok?'rgba(5,150,105,0.04)':'rgba(28,25,23,0.03)', border:`1px solid ${pt.ok?'rgba(5,150,105,0.15)':C.border}` }}>
                        <span style={{ color:pt.ok?C.success:C.tMut, fontWeight:700, fontSize:13, flexShrink:0, marginTop:2 }}>{pt.ok?'✓':'→'}</span>
                        <span style={{ fontSize:13.5, lineHeight:1.65, color:C.tSec }}>{pt.text}</span>
                      </div>
                    ))}
                  </Section>
                </div>
              )}

              {/* ⑦ Refined prompt */}
              {revealed >= 7 && (
                <div style={{ animation:'fadeUp 300ms ease forwards' }}>
                  <Div/>
                  <Section id="refined">
                    <div style={{ fontSize:11, fontWeight:600, color:C.tMut, letterSpacing:'.07em', textTransform:'uppercase', marginBottom:10 }}>Refined — edit if you'd like</div>
                    <textarea value={refinedText} onChange={e=>setRefinedText(e.target.value)}
                      style={{ width:'100%', height:160, padding:'14px 16px', border:`1px solid rgba(28,25,23,0.12)`, borderRadius:10, fontSize:13.5, lineHeight:1.7, color:C.tPri, background:C.canvas, resize:'none', outline:'none', fontFamily:'inherit', transition:'border-color 150ms' }}
                      onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor='rgba(28,25,23,0.12)'}/>
                    {revealed < 8 && <button className="btn btn-primary" onClick={() => reveal(8)} style={{ marginTop:16, padding:'12px 24px', fontSize:13.5 }}>Use this — start lab →</button>}
                  </Section>
                </div>
              )}

              {/* ⑧ Lab headline */}
              {revealed >= 8 && (
                <div style={{ animation:'fadeUp 300ms ease forwards' }}>
                  <Div/>
                  <div style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:16 }}>
                    <div style={{ width:26, height:26, borderRadius:7, background:C.accent, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:800, color:'#fff', flexShrink:0, marginTop:4 }}>H</div>
                    <div>
                      <h3 style={{ fontSize:26, fontWeight:700, color:C.tPri, letterSpacing:'-0.025em', lineHeight:1.25, marginBottom:6 }}>{LL.headlines.lab}</h3>
                      <p style={{ fontSize:14, lineHeight:1.7, color:C.tSec }}>{LL.labIntro}</p>
                    </div>
                  </div>
                </div>
              )}

              {/* ⑨ Lab card */}
              {revealed >= 9 && (
                <div style={{ animation:'fadeUp 300ms ease forwards' }}>
                  <div style={{ borderRadius:12, border:`1px solid ${C.border}`, padding:'16px 18px', marginBottom:16 }}>
                    <div style={{ fontSize:10, fontWeight:600, color:C.tMut, letterSpacing:'.08em', textTransform:'uppercase', marginBottom:12 }}>What the lab covers</div>
                    {LL.labCovers.map((item,i) => (<div key={i} style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:i<LL.labCovers.length-1?8:0 }}><span style={{ color:C.success, fontSize:12, flexShrink:0, marginTop:2, fontWeight:700 }}>✓</span><span style={{ fontSize:13, color:C.tSec, lineHeight:1.55 }}>{item}</span></div>))}
                  </div>
                  <div style={{ display:'flex', gap:10 }}>
                    <button className="btn btn-primary" onClick={() => { setCursorStep(0); setLabMode('cursor'); }} style={{ flex:1, padding:'13px 20px', fontSize:13.5 }}>Launch lab →</button>
                    <button onClick={() => setShowTutorial(true)} style={{ flex:1, padding:'12px 20px', fontSize:13, fontWeight:500, background:'transparent', border:`1px solid rgba(28,25,23,0.15)`, borderRadius:10, color:C.tSec, cursor:'pointer', fontFamily:'inherit' }}>Start with tutorial</button>
                  </div>
                </div>
              )}
            </div>
          </div>
          <SkillTracker collapsed={trackerCollapsed} onToggle={() => setTrackerCollapsed(c=>!c)} trackerData={LL.tracker} simplified={true}/>
        </div>
      );
    }

    /* ── Arc ── */
    function Arc({ size = 120, pct = 1 }) {
      const r = size/2 - 7, circ = 2*Math.PI*r;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="5.5"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.accent} strokeWidth="5.5"
            strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform={`rotate(-90 ${size/2} ${size/2})`}/>
        </svg>
      );
    }

    /* ── Skill Chart — admin style ── */
    function SkillChart() {
      const [hoverIdx, setHoverIdx] = React.useState(null);
      const svgRef = React.useRef(null);

      const MONTHS  = ['APR','MAY','JUN','JUL','AUG','SEP','OCT'];
      const aiPts   = [1, 2, 2, 3, 3, 4, 5];
      const techPts = [0, 0, 1, 2, 2, 3, 4];

      const SVW=560, SVH=170, SPL=22, SPR=44, SPT=14, SPB=26;
      const spW = SVW-SPL-SPR, spH = SVH-SPT-SPB;
      const maxV = 6;
      const sxP = (i) => SPL + (i/(MONTHS.length-1))*spW;
      const syP = (v) => SPT + spH - (v/maxV)*spH;

      const smkPath = (pts) => {
        let d = `M ${sxP(0).toFixed(1)} ${syP(pts[0]).toFixed(1)}`;
        for (let i=1; i<pts.length; i++) {
          const cx = ((sxP(i-1)+sxP(i))/2).toFixed(1);
          d += ` C ${cx} ${syP(pts[i-1]).toFixed(1)} ${cx} ${syP(pts[i]).toFixed(1)} ${sxP(i).toFixed(1)} ${syP(pts[i]).toFixed(1)}`;
        }
        return d;
      };

      const handleMove = (e) => {
        const svg = svgRef.current; if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) * (SVW / rect.width);
        let best=0, bestD=Infinity;
        MONTHS.forEach((_,i) => { const d=Math.abs(svgX-sxP(i)); if(d<bestD){bestD=d;best=i;} });
        setHoverIdx(bestD<48 ? best : null);
      };

      return (
        <div style={{ background: C.canvas, borderRadius:'16px', padding:'22px 26px 18px', border:`1px solid rgba(28,25,23,0.07)`, position:'relative' }}>
          {/* Summary */}
          <div style={{ marginBottom:'14px' }}>
            <div style={{ fontSize:'22px', fontWeight:'700', color:C.tPri, letterSpacing:'-0.025em', lineHeight:'1.2', marginBottom:'4px' }}>
              5 skills verified — you're ahead of pace.
            </div>
            <div style={{ fontSize:'11.5px', color:C.tMut }}>Apr → Oct 2026 · Skills verified over time</div>
          </div>
          {/* Legend */}
          <div style={{ display:'flex', gap:'14px', marginBottom:'8px' }}>
            {[{color:C.accent,label:'AI Skills'},{color:C.warm,label:'Technical'}].map(({color,label}) => (
              <div key={label} style={{ display:'flex', alignItems:'center', gap:'5px' }}>
                <svg width="18" height="6"><line x1="0" y1="3" x2="18" y2="3" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>
                <span style={{ fontSize:'10.5px', color:C.tMut }}>{label}</span>
              </div>
            ))}
          </div>
          {/* SVG */}
          <div style={{ position:'relative' }}>
            <svg ref={svgRef} width="100%" viewBox={`0 0 ${SVW} ${SVH}`}
              style={{ display:'block', overflow:'visible', cursor:'crosshair' }}
              onMouseMove={handleMove} onMouseLeave={() => setHoverIdx(null)}>

              {/* Grid */}
              {[0,2,4,6].map(v => (
                <g key={v}>
                  <line x1={SPL} y1={syP(v)} x2={SVW-SPR+8} y2={syP(v)}
                    stroke="rgba(28,25,23,0.07)" strokeWidth={v===0?0.8:0.5} strokeDasharray={v===0?'none':'3 8'}/>
                  <text x={SPL-5} y={syP(v)+3.5} textAnchor="end" fill="rgba(28,25,23,0.3)"
                    fontSize="8" fontFamily="system-ui,sans-serif">{v}</text>
                </g>
              ))}

              {/* NOW marker */}
              <line x1={sxP(6)} y1={SPT-4} x2={sxP(6)} y2={SVH-SPB+4}
                stroke="rgba(28,25,23,0.1)" strokeWidth="1" strokeDasharray="3 5"/>
              <rect x={sxP(6)-14} y={SPT-16} width="28" height="12" rx="3" fill="rgba(28,25,23,0.07)"/>
              <text x={sxP(6)} y={SPT-6} textAnchor="middle" fill="rgba(28,25,23,0.45)"
                fontSize="6.5" fontWeight="600" letterSpacing="0.08em" fontFamily="system-ui,sans-serif">NOW</text>

              {/* Technical line */}
              <path d={smkPath(techPts)} stroke={C.warm} strokeWidth="2"
                fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.85"/>

              {/* AI Skills line */}
              <path d={smkPath(aiPts)} stroke={C.accent} strokeWidth="2.5"
                fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.92"/>

              {/* End dots + values */}
              <circle cx={sxP(6)} cy={syP(aiPts[6])}   r="4.5" fill={C.accent}  stroke="#fff" strokeWidth="2"/>
              <text x={sxP(6)+9} y={syP(aiPts[6])+3.5}   fill={C.tPri} fontSize="8.5" fontWeight="700" fontFamily="system-ui,sans-serif">{aiPts[6]}</text>
              <circle cx={sxP(6)} cy={syP(techPts[6])} r="4.5" fill={C.warm} stroke="#fff" strokeWidth="2"/>
              <text x={sxP(6)+9} y={syP(techPts[6])+3.5} fill={C.tPri} fontSize="8.5" fontWeight="700" fontFamily="system-ui,sans-serif">{techPts[6]}</text>

              {/* Hover crosshair */}
              {hoverIdx !== null && (
                <line x1={sxP(hoverIdx)} y1={SPT} x2={sxP(hoverIdx)} y2={SVH-SPB}
                  stroke="rgba(28,25,23,0.18)" strokeWidth="1"/>
              )}

              {/* X-axis months — ALL CAPS */}
              {MONTHS.map((m,i) => (
                <text key={m} x={sxP(i)} y={SVH-SPB+16} textAnchor="middle"
                  fill={i===6 ? C.tPri : 'rgba(28,25,23,0.38)'}
                  fontSize="8.5" fontWeight={i===6?'600':'400'}
                  fontFamily="system-ui,sans-serif">{m}</text>
              ))}
            </svg>

            {/* Hover tooltip */}
            {hoverIdx !== null && (() => {
              const left = Math.min(Math.max(sxP(hoverIdx)/SVW*100, 10), 78);
              return (
                <div style={{ position:'absolute', top:'6px', left:`${left}%`,
                  background:'white', borderRadius:'10px', padding:'10px 14px',
                  boxShadow:'0 4px 20px rgba(0,0,0,0.12)', minWidth:'140px',
                  pointerEvents:'none', zIndex:20, border:`1px solid rgba(28,25,23,0.06)` }}>
                  <div style={{ fontSize:'10.5px', color:C.tMut, marginBottom:'8px', fontWeight:'500' }}>
                    {MONTHS[hoverIdx].charAt(0)+MONTHS[hoverIdx].slice(1).toLowerCase()} 2026
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'5px' }}>
                    <span style={{ background:C.accent, color:'white', fontSize:'13px', fontWeight:'700', padding:'2px 8px', borderRadius:'5px' }}>{aiPts[hoverIdx]}</span>
                    <span style={{ fontSize:'11px', color:C.tSec }}>AI skills</span>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                    <span style={{ background:C.warm, color:'white', fontSize:'13px', fontWeight:'700', padding:'2px 8px', borderRadius:'5px' }}>{techPts[hoverIdx]}</span>
                    <span style={{ fontSize:'11px', color:C.tSec }}>Technical skills</span>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      );
    }

    /* ── App ── */
    function App() {
      const [tab, setTab] = useState(0);
      const [collapsed, setCollapsed] = useState(true);
      const [justVerified, setJustVerified] = useState(false);
      const [learnerIdx, setLearnerIdx] = useState(0);
      const [showNav, setShowNav] = useState(false);
      const lastScrollY = useRef(0);
      const learner = LEARNERS[learnerIdx];

      // Detect scroll direction on any child element (capture phase)
      useEffect(() => {
        function onScroll(e) {
          const el = e.target;
          const y = el.scrollTop ?? 0;
          const delta = y - lastScrollY.current;
          if (delta > 4 && y > 80)  setShowNav(true);
          if (delta < -4 || y < 40) setShowNav(false);
          lastScrollY.current = y;
        }
        document.addEventListener('scroll', onScroll, true);
        return () => document.removeEventListener('scroll', onScroll, true);
      }, []);

      function handleLearnerSelect(idx) {
        setLearnerIdx(idx);
        setTab(1);
        setJustVerified(false);
      }

      return (
        <div style={{ height:'100vh', display:'flex', background:C.canvas, padding:'8px', gap:'8px', boxSizing:'border-box' }}>
          <LearnerSwitcher active={learnerIdx} onSelect={handleLearnerSelect} show={showNav}/>
          <Sidebar tab={tab} onSelect={t => { setTab(t); }} collapsed={collapsed} onToggle={() => setCollapsed(c => !c)} learner={learner}/>
          <div style={{ flex:1, display:'flex', overflow:'hidden', borderRadius:'12px', overflow:'hidden' }}>
            {tab===0 && <VignetteMyPlan  onSelectLearner={handleLearnerSelect}/>}
            {tab===1 && <VignetteLearn   key={learner.id} learner={learner} onSubmit={() => { setJustVerified(true); setTab(2); }}/>}
            {tab===2 && <VignetteWallet  key={String(justVerified)} justVerified={justVerified} onDismiss={() => setJustVerified(false)} learner={learner}/>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
