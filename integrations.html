<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coursera — Integrations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F4F1;
      color: #1C1917;
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea { font-family: inherit; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes widgetSlideIn {
      from { opacity: 0; transform: translateX(14px) scale(0.96); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .fade-up    { animation: fadeSlideUp  0.28s cubic-bezier(0.4,0,0.2,1) both; }
    .fade-up-d1 { animation: fadeSlideUp  0.28s cubic-bezier(0.4,0,0.2,1) 0.08s both; }
    .fade-up-d2 { animation: fadeSlideUp  0.28s cubic-bezier(0.4,0,0.2,1) 0.16s both; }
    .widget-in  { animation: widgetSlideIn 0.38s cubic-bezier(0.34,1.15,0.64,1) 0.5s both; }
    .fade-in    { animation: fadeIn 0.3s ease both; }

    .scroll { overflow-y: auto; overflow-x: hidden; }
    .scroll::-webkit-scrollbar { width: 4px; }
    .scroll::-webkit-scrollbar-track { background: transparent; }
    .scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

    .slack-scroll::-webkit-scrollbar { width: 0px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ── Design tokens ─────────────────────────────────────── */
  const C = {
    accent:     '#5B5FEF',
    accentLt:   'rgba(91,95,239,0.08)',
    warm:       '#E76F3A',
    success:    '#059669',
    warning:    '#D97706',
    border:     '#E8E5E0',
    muted:      '#F0EDE8',
    canvas:     '#F5F4F1',
    surface:    '#FFFFFF',
    tPri:       '#1C1917',
    tSec:       '#57534E',
    tMut:       '#A8A29E',
    coursera:   '#0057C5',
    courseraLt: 'rgba(0,87,197,0.06)',
  };

  /* ── Icons ─────────────────────────────────────────────── */
  /* Real Slack 4-colour hashtag logo */
  function IconSlack({ size = 16 }) {
    return (
      <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
        {/* Green — top-left L */}
        <rect x="18" y="4"  width="14" height="28" rx="7" fill="#2EB67D"/>
        <rect x="4"  y="18" width="28" height="14" rx="7" fill="#2EB67D"/>
        {/* Cyan — top-right L */}
        <rect x="48" y="4"  width="14" height="28" rx="7" fill="#36C5F0"/>
        <rect x="48" y="18" width="28" height="14" rx="7" fill="#36C5F0"/>
        {/* Yellow — bottom-right L */}
        <rect x="48" y="48" width="14" height="28" rx="7" fill="#ECB22E"/>
        <rect x="48" y="48" width="28" height="14" rx="7" fill="#ECB22E"/>
        {/* Red — bottom-left L */}
        <rect x="18" y="48" width="14" height="28" rx="7" fill="#E01E5A"/>
        <rect x="4"  y="48" width="28" height="14" rx="7" fill="#E01E5A"/>
      </svg>
    );
  }

  function IconClaude({ size = 16, color = 'currentColor' }) {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.4" fill="none"/>
        <circle cx="9"  cy="10" r="1.6" fill={color}/>
        <circle cx="15" cy="10" r="1.6" fill={color}/>
        <circle cx="12" cy="14.5" r="1.6" fill={color}/>
        <line x1="9" y1="10" x2="15"  y2="10"   stroke={color} strokeWidth="0.9" opacity="0.45"/>
        <line x1="9" y1="10" x2="12"  y2="14.5" stroke={color} strokeWidth="0.9" opacity="0.45"/>
        <line x1="15" y1="10" x2="12" y2="14.5" stroke={color} strokeWidth="0.9" opacity="0.45"/>
      </svg>
    );
  }

  function IconWorkday({ size = 16, color = 'currentColor' }) {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="6.5" r="3.5" stroke={color} strokeWidth="1.4" fill="none"/>
        <circle cx="5"  cy="18" r="2.5" stroke={color} strokeWidth="1.4" fill="none"/>
        <circle cx="19" cy="18" r="2.5" stroke={color} strokeWidth="1.4" fill="none"/>
        <path d="M3 22 Q5 15.5 12 15.5 Q19 15.5 21 22"
          stroke={color} strokeWidth="1.2" fill="none" strokeLinecap="round" opacity="0.5"/>
      </svg>
    );
  }

  /* ── Top Navigator ─────────────────────────────────────── */
  function Navigator({ active, onSelect }) {
    const tabs = [
      { id: 'slack',   label: 'Slack',   Icon: IconSlack },
      { id: 'claude',  label: 'Claude',  Icon: IconClaude },
      { id: 'workday', label: 'Workday', Icon: IconWorkday },
    ];
    return (
      <div style={{
        height: '54px', background: C.surface,
        borderBottom: `1px solid ${C.border}`,
        display: 'flex', alignItems: 'center',
        padding: '0 20px', gap: '6px', flexShrink: 0,
      }}>
        {/* Brand */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginRight: '16px' }}>
          <div style={{ width: '30px', height: '30px', borderRadius: '8px', background: C.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '14px', fontWeight: '700', color: '#fff', flexShrink: 0 }}>C</div>
          <div>
            <div style={{ fontSize: '13px', fontWeight: '600', color: C.tPri, lineHeight: '1.2' }}>Coursera</div>
            <div style={{ fontSize: '10px', fontWeight: '600', color: C.tMut, letterSpacing: '0.07em', textTransform: 'uppercase' }}>Integrations</div>
          </div>
        </div>

        <div style={{ width: '1px', height: '24px', background: C.border, marginRight: '8px' }}/>

        {/* Tabs */}
        {tabs.map(({ id, label, Icon }) => {
          const isActive = active === id;
          return (
            <button key={id} onClick={() => onSelect(id)} style={{
              display: 'flex', alignItems: 'center', gap: '7px',
              padding: '7px 14px', borderRadius: '8px', border: 'none',
              background: isActive ? C.accent : 'transparent',
              color: isActive ? '#fff' : C.tSec,
              fontSize: '13px', fontWeight: isActive ? '600' : '400',
              cursor: 'pointer', transition: 'all 140ms cubic-bezier(0.4,0,0.2,1)',
            }}>
              <Icon size={14}/>
              {label}
              <div style={{
                width: '6px', height: '6px', borderRadius: '50%',
                background: isActive ? 'rgba(255,255,255,0.55)' : C.success,
              }}/>
            </button>
          );
        })}

        <div style={{ flex: 1 }}/>

        <button style={{
          display: 'flex', alignItems: 'center', gap: '6px',
          padding: '7px 14px', borderRadius: '8px',
          border: `1.5px dashed ${C.border}`, background: 'transparent',
          color: C.tMut, fontSize: '13px', fontWeight: '500', cursor: 'pointer',
        }}>
          <span style={{ fontSize: '15px', lineHeight: 1, marginTop: '-1px' }}>+</span> Connect
        </button>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════
     SLACK VIEW — Weekly Manager Digest
  ══════════════════════════════════════════════════════════ */
  function SlackView() {
    const [activeChart, setActiveChart]       = useState('prototyping');
    const [activeSubSkill, setActiveSubSkill] = useState(null);
    const [hoverIdx, setHoverIdx]             = useState(null);
    const chartSvgRef = useRef(null);

    const MONTHS           = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr'];
    const MONTH_YR_LABELS  = ['Oct 2025','Nov 2025','Dec 2025','Jan 2026','Feb 2026','Mar 2026','Apr 2026'];
    const TOOLTIP_MEMBERS  = ['Lena M.','Aisha O.','Marcus C.','Sophie K.','David L.','James P.','Emma T.','Yuki W.','Nadia F.','Sam B.','Alex R.','Carlos V.','Mei L.','Raj P.','Zara H.'];

    const AREA_META = [
      { id: 'prototyping', label: 'AI Prototyping', pct: 67, delta: 45 },
      { id: 'data',        label: 'Data Literacy',  pct: 73, delta: 45 },
      { id: 'strategy',    label: 'AI Strategy',    pct: 27, delta: 22 },
      { id: 'management',  label: 'Management',     pct: 7,  delta: 7  },
    ];
    const TAB_COLORS = {
      prototyping: { bg: '#9CDEEC', text: '#1C1917' },
      data:        { bg: '#FF4800', text: '#FFFFFF' },
      strategy:    { bg: '#510825', text: '#FFFFFF' },
      management:  { bg: '#0065FF', text: '#FFFFFF' },
    };
    const CHART_STYLES = {
      prototyping: { bg:'#9CDEEC', linePrimary:'#1C1917',                lineSub:'rgba(28,25,23,0.18)',    dimText:'rgba(28,25,23,0.45)',   valText:'#1C1917',                  gridStroke:'rgba(28,25,23,0.1)',    nowFill:'rgba(28,25,23,0.1)',    nowText:'rgba(28,25,23,0.75)' },
      data:        { bg:'#FF4800', linePrimary:'#FFFFFF',                lineSub:'rgba(255,255,255,0.22)', dimText:'rgba(255,255,255,0.5)', valText:'white',                    gridStroke:'rgba(255,255,255,0.15)',nowFill:'rgba(255,255,255,0.2)', nowText:'white' },
      strategy:    { bg:'#510825', linePrimary:'#FF4800',                lineSub:'rgba(255,255,255,0.18)', dimText:'rgba(255,255,255,0.45)',valText:'rgba(255,255,255,0.95)',    gridStroke:'rgba(255,255,255,0.12)',nowFill:'rgba(255,255,255,0.15)',nowText:'white' },
      management:  { bg:'#0065FF', linePrimary:'rgba(255,255,255,0.95)',lineSub:'rgba(255,255,255,0.2)',  dimText:'rgba(255,255,255,0.5)', valText:'white',                    gridStroke:'rgba(255,255,255,0.18)',nowFill:'rgba(255,255,255,0.2)', nowText:'white' },
    };
    const AREA_TRENDS = {
      prototyping: {
        summary: (p,d) => `AI Prototyping is tracking at ${p}% team readiness — up ${d}% since October.`,
        companyAvg: [1,2,3,4,5,6,7],
        skills: [
          { label:'Prompt Engineering',     pts:[3,4,6,8,10,11,13] },
          { label:'AI Workflow Integration', pts:[1,3,5,7,9,10,12]  },
          { label:'Claude API Fundamentals', pts:[1,2,3,4,5,6,7]   },
          { label:'Prototyping & Iteration', pts:[0,1,1,2,3,4,6]   },
        ],
      },
      data: {
        summary: (p,d) => `Data Literacy is your strongest area at ${p}% — up ${d}% since October.`,
        companyAvg: [3,4,5,6,7,8,9],
        skills: [
          { label:'Interpret AI Outputs', pts:[5,6,7,8,9,10,11] },
          { label:'Validate Results',     pts:[3,5,6,7,8,9,11]  },
          { label:'Data Visualization',   pts:[3,4,5,6,7,8,10]  },
        ],
      },
      strategy: {
        summary: (p,d) => `AI Strategy is an early-stage area at ${p}% — up ${d}% since October.`,
        companyAvg: [0,0,0.5,1,2,2.5,3],
        skills: [
          { label:'AI Evaluation',        pts:[0,0,1,2,3,4,5] },
          { label:'AI Governance & Risk', pts:[0,0,0,1,1,2,3] },
          { label:'AI Roadmapping',       pts:[0,0,0,0,1,1,2] },
        ],
      },
      management: {
        summary: (p,d) => `Management skills are just getting started at ${p}% — focus area for Q2.`,
        companyAvg: [0,0,0,0,0.5,0.5,1],
        skills: [
          { label:'Change Management', pts:[0,0,0,0,0,1,1] },
          { label:'Coaching for AI',   pts:[0,0,0,0,0,1,1] },
          { label:'Culture Building',  pts:[0,0,0,0,0,0,1] },
        ],
      },
    };

    const SVW=560, SVH=155, SPL=26, SPR=42, SPT=14, SPB=22;
    const spW=SVW-SPL-SPR, spH=SVH-SPT-SPB;
    const sxP = (i) => SPL + (i/6)*spW;
    const syP = (v) => SPT + spH - (v/15)*spH;
    const mkPath = (pts) => {
      let d=`M ${sxP(0).toFixed(1)} ${syP(pts[0]).toFixed(1)}`;
      for(let i=1;i<pts.length;i++){
        const cx=((sxP(i-1)+sxP(i))/2).toFixed(1);
        d+=` C ${cx} ${syP(pts[i-1]).toFixed(1)} ${cx} ${syP(pts[i]).toFixed(1)} ${sxP(i).toFixed(1)} ${syP(pts[i]).toFixed(1)}`;
      }
      return d;
    };
    const handleChartMove = (e) => {
      if(!chartSvgRef.current) return;
      const rect=chartSvgRef.current.getBoundingClientRect();
      const x=(e.clientX-rect.left)/rect.width*SVW;
      let nearest=0, minDist=Infinity;
      for(let i=0;i<7;i++){const d=Math.abs(x-sxP(i));if(d<minDist){minDist=d;nearest=i;}}
      setHoverIdx(nearest);
    };
    const handleChartLeave = () => setHoverIdx(null);

    return (
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

        {/* ── Slack Sidebar ── */}
        <div style={{
          width: '258px', flexShrink: 0,
          background: '#4A154B',
          display: 'flex', flexDirection: 'column', overflow: 'hidden',
        }}>
          {/* Workspace header */}
          <div style={{ padding: '14px 16px 12px', borderBottom: '1px solid rgba(255,255,255,0.07)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <div style={{ width: '28px', height: '28px', borderRadius: '6px', background: '#1A2A50', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '13px', fontWeight: '800', color: '#fff' }}>M</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                <span style={{ fontSize: '15px', fontWeight: '700', color: '#fff' }}>Meridian</span>
                <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M3 5l3 3 3-3" stroke="rgba(255,255,255,0.45)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
            </div>
            <div style={{ width: '26px', height: '26px', borderRadius: '50%', background: 'rgba(255,255,255,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
              <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zm0 2.5v3l2 1.2" stroke="rgba(255,255,255,0.55)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>

          {/* Sidebar nav */}
          <div className="scroll slack-scroll" style={{ flex: 1, padding: '10px 0' }}>

            {/* Channels */}
            <div style={{ padding: '2px 16px 4px', fontSize: '11px', fontWeight: '700', color: 'rgba(255,255,255,0.38)', letterSpacing: '0.07em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              Channels <span style={{ cursor: 'pointer' }}>+</span>
            </div>
            {['general', 'design-team', 'ai-prototyping', 'skills-updates'].map(ch => (
              <div key={ch} style={{ padding: '5px 16px', fontSize: '14px', color: ch === 'ai-prototyping' ? '#fff' : 'rgba(255,255,255,0.5)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '6px', background: ch === 'ai-prototyping' ? 'rgba(255,255,255,0.1)' : 'transparent', borderRadius: '4px', margin: '0 8px 1px' }}>
                <span style={{ opacity: 0.5, fontSize: '14px' }}>#</span>
                <span style={{ fontWeight: ch === 'ai-prototyping' ? '500' : '400' }}>{ch}</span>
                {ch === 'skills-updates' && <div style={{ marginLeft: 'auto', minWidth: '18px', height: '18px', borderRadius: '9px', background: C.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '10px', fontWeight: '700', color: '#fff' }}>3</div>}
              </div>
            ))}

            {/* DMs */}
            <div style={{ padding: '12px 16px 4px', fontSize: '11px', fontWeight: '700', color: 'rgba(255,255,255,0.38)', letterSpacing: '0.07em', textTransform: 'uppercase' }}>Direct Messages</div>
            {[
              { name: 'Milee Yu', initials: 'MY', color: '#6366F1' },
              { name: 'Marcus Chen', initials: 'MC', color: C.warm },
              { name: 'Olwen Puralena', initials: 'OP', color: '#059669' },
              { name: 'Kari Hedberg (you)', initials: 'KH', color: '#8B8FFF' },
            ].map(dm => (
              <div key={dm.name} style={{ padding: '4px 16px', fontSize: '14px', color: 'rgba(255,255,255,0.5)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px', borderRadius: '4px', margin: '0 8px 1px' }}>
                <div style={{ width: '18px', height: '18px', borderRadius: '4px', background: dm.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '9px', fontWeight: '700', color: '#fff', flexShrink: 0 }}>{dm.initials}</div>
                <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{dm.name}</span>
              </div>
            ))}

            {/* Apps */}
            <div style={{ padding: '12px 16px 4px', fontSize: '11px', fontWeight: '700', color: 'rgba(255,255,255,0.38)', letterSpacing: '0.07em', textTransform: 'uppercase' }}>Apps</div>
            {[
              { name: 'Coursera Skills', color: C.accent,  letter: 'C', active: true },
              { name: 'Workday',         color: '#BF3507', letter: 'W', active: false },
              { name: 'Jirabot',         color: '#4A90D9', letter: 'J', active: false },
            ].map(app => (
              <div key={app.name} style={{ padding: '5px 16px', fontSize: '14px', color: app.active ? '#fff' : 'rgba(255,255,255,0.5)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px', background: app.active ? 'rgba(91,95,239,0.28)' : 'transparent', borderRadius: '4px', margin: '0 8px 1px', fontWeight: app.active ? '500' : '400' }}>
                <div style={{ width: '18px', height: '18px', borderRadius: '4px', background: app.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '10px', fontWeight: '700', color: '#fff', flexShrink: 0 }}>{app.letter}</div>
                {app.name}
              </div>
            ))}
          </div>

          {/* User footer */}
          <div style={{ padding: '10px 16px', borderTop: '1px solid rgba(255,255,255,0.07)', display: 'flex', alignItems: 'center', gap: '9px' }}>
            <div style={{ position: 'relative', flexShrink: 0 }}>
              <div style={{ width: '30px', height: '30px', borderRadius: '6px', background: '#6366F1', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: '700', color: '#fff' }}>PS</div>
              <div style={{ position: 'absolute', bottom: '-2px', right: '-2px', width: '9px', height: '9px', borderRadius: '50%', background: '#059669', border: '2px solid #4A154B' }}/>
            </div>
            <div>
              <div style={{ fontSize: '13px', fontWeight: '600', color: '#fff' }}>Priya Sharma</div>
              <div style={{ fontSize: '11px', color: 'rgba(255,255,255,0.38)' }}>Active</div>
            </div>
          </div>
        </div>

        {/* ── Main message area ── */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: '#fff', overflow: 'hidden' }}>

          {/* Channel header */}
          <div style={{ padding: '12px 20px', borderBottom: '1px solid #EBEBEB', display: 'flex', alignItems: 'center', gap: '10px', flexShrink: 0 }}>
            <div style={{ width: '30px', height: '30px', borderRadius: '8px', background: C.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '14px', fontWeight: '700', color: '#fff', flexShrink: 0 }}>C</div>
            <div>
              <div style={{ fontSize: '15px', fontWeight: '700', color: '#1A1A1A' }}>Coursera Skills</div>
              <div style={{ fontSize: '12px', color: '#8E8E93' }}>App · Weekly team digest + skill alerts</div>
            </div>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: '8px' }}>
              {['Home', 'Messages', 'About'].map((t, i) => (
                <button key={t} style={{ padding: '6px 13px', borderRadius: '6px', border: '1px solid', borderColor: i === 1 ? '#1A1A1A' : '#E0E0E0', background: i === 1 ? '#1A1A1A' : 'transparent', fontSize: '12px', fontWeight: i === 1 ? '600' : '400', color: i === 1 ? '#fff' : '#6B7280', cursor: 'pointer' }}>{t}</button>
              ))}
            </div>
          </div>

          {/* Messages */}
          <div className="scroll fade-in" style={{ flex: 1, padding: '22px 24px', display: 'flex', flexDirection: 'column', gap: '20px' }}>

            {/* Date divider */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <div style={{ flex: 1, height: '1px', background: '#EBEBEB' }}/>
              <span style={{ fontSize: '12px', fontWeight: '500', color: '#8E8E93', flexShrink: 0 }}>Monday, April 27</span>
              <div style={{ flex: 1, height: '1px', background: '#EBEBEB' }}/>
            </div>

            {/* Main bot message */}
            <div className="fade-up" style={{ display: 'flex', gap: '12px', alignItems: 'flex-start' }}>

  /* ── Claude asterisk logo ── */
  function ClaudeAsterisk({ size = 20, color = '#CF7A65' }) {
    const arms = 8;
    const spokes = Array.from({ length: arms }, (_, i) => {
      const a = (i * 360 / arms) * Math.PI / 180;
      const r1 = size * 0.22, r2 = size * 0.48;
      return { x1: size/2 + Math.cos(a)*r1, y1: size/2 + Math.sin(a)*r1, x2: size/2 + Math.cos(a)*r2, y2: size/2 + Math.sin(a)*r2 };
    });
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
        {spokes.map((s, i) => (
          <line key={i} x1={s.x1} y1={s.y1} x2={s.x2} y2={s.y2}
            stroke={color} strokeWidth={size * 0.115} strokeLinecap="round"/>
        ))}
      </svg>
    );
  }

                        </p>
                        <p style={{ margin:'0 0 8px', fontSize:'11px', color:cs.dimText }}>Oct 2025 → Apr 2026 · 15 members</p>
                        <div style={{ display:'flex', gap:'12px', marginBottom:'5px' }}>
                          <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                            <svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke={cs.linePrimary} strokeWidth="2.5" strokeLinecap="round" opacity="0.92"/></svg>
                            <span style={{ fontSize:'10px', color:cs.dimText }}>Your team</span>
                          </div>
                          <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                            <svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke={cs.linePrimary} strokeWidth="1.5" strokeDasharray="4 3" strokeLinecap="round" opacity="0.5"/></svg>
                            <span style={{ fontSize:'10px', color:cs.dimText }}>Company avg</span>
                          </div>
                        </div>
                        <div style={{ position:'relative' }}>
                          <svg ref={chartSvgRef} onMouseMove={handleChartMove} onMouseLeave={handleChartLeave}
                            width="100%" viewBox={`0 0 ${SVW} ${SVH}`} style={{ display:'block', overflow:'visible', cursor:'crosshair' }}>
                            {[0,5,10,15].map(v=>(
                              <g key={v}>
                                <line x1={SPL} y1={syP(v)} x2={SVW-SPR+6} y2={syP(v)} stroke={cs.gridStroke} strokeWidth={v===0?1:0.6} strokeDasharray={v===0?'none':'3 7'}/>
                                <text x={SPL-4} y={syP(v)+3.5} textAnchor="end" fill={cs.dimText} fontSize="8" fontFamily="system-ui,sans-serif">{v}</text>
                              </g>
                            ))}
                            <line x1={sxP(6)} y1={SPT-4} x2={sxP(6)} y2={SVH-SPB+4} stroke={cs.gridStroke} strokeWidth="1" strokeDasharray="3 4"/>
                            <rect x={sxP(6)-14} y={SPT-15} width="28" height="11" rx="3" fill={cs.nowFill}/>
                            <text x={sxP(6)} y={SPT-6} textAnchor="middle" fill={cs.nowText} fontSize="7" fontWeight="600" letterSpacing="0.04em" fontFamily="system-ui,sans-serif">NOW</text>
                            {chartTrends.skills.map(({pts},j)=>(
                              <path key={j} d={mkPath(pts)} stroke={cs.lineSub} strokeWidth="1" fill="none" strokeLinecap="round"/>
                            ))}
                            <path d={mkPath(chartTrends.companyAvg)} stroke={cs.linePrimary} strokeWidth="1.5" strokeDasharray="4 5" fill="none" strokeLinecap="round" opacity="0.4"/>
                            <path d={mkPath(primaryPts)} stroke={cs.linePrimary} strokeWidth="2.5" fill="none" strokeLinecap="round" opacity="0.92"/>
                            <circle cx={sxP(6)} cy={syP(primaryEndVal)} r="5" fill={cs.linePrimary} opacity="0.92"/>
                            <text x={sxP(6)+10} y={syP(primaryEndVal)+3.5} fill={cs.valText} fontSize="9" fontWeight="700" fontFamily="system-ui,sans-serif">{primaryEndVal}</text>
                            {hoverIdx!==null && <line x1={sxP(hoverIdx)} y1={SPT} x2={sxP(hoverIdx)} y2={SVH-SPB} stroke={cs.linePrimary} strokeWidth="1" opacity="0.35"/>}
                            {MONTHS.map((m,i)=>(
                              <text key={m} x={sxP(i)} y={SVH-SPB+13} textAnchor="middle"
                                fill={i===6?cs.valText:cs.dimText} fontSize="8" fontWeight={i===6?'600':'400'}
                                fontFamily="system-ui,sans-serif">{m.toUpperCase()}</text>
                            ))}
                          </svg>
                          {hoverIdx!==null && (()=>{
                            const count=Math.round(primaryPts[hoverIdx]);
                            const coAvgPct=Math.round(chartTrends.companyAvg[hoverIdx]/15*100);
                            const names=TOOLTIP_MEMBERS.slice(0,count);
                            const leftPct=sxP(hoverIdx)/SVW*100;
                            const cl=Math.min(Math.max(leftPct,12),82);
                            return (
                              <div style={{ position:'absolute', top:'8px', left:`${cl}%`, transform:'translateX(-50%)',
                                background:'white', borderRadius:'10px', padding:'10px 14px',
                                boxShadow:'0 4px 24px rgba(0,0,0,0.14)', minWidth:'160px', pointerEvents:'none', zIndex:20 }}>
                                <div style={{ fontSize:'11px', color:C.tMut, marginBottom:'7px', fontWeight:'500' }}>{MONTH_YR_LABELS[hoverIdx]}</div>
                                <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'4px' }}>
                                  <span style={{ background:'#1C1917', color:'white', fontSize:'13px', fontWeight:'700', padding:'2px 8px', borderRadius:'5px', minWidth:'28px', textAlign:'center' }}>{count}</span>
                                  <span style={{ fontSize:'11px', color:C.tSec }}>your team at goal</span>
                                </div>
                                <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:names.length?'8px':0 }}>
                                  <span style={{ background:C.canvas, color:C.tSec, fontSize:'12px', fontWeight:'600', padding:'2px 8px', borderRadius:'5px', minWidth:'28px', textAlign:'center', border:'1px dashed rgba(28,25,23,0.2)' }}>{coAvgPct}%</span>
                                  <span style={{ fontSize:'11px', color:C.tMut }}>company avg</span>
                                </div>
                                {names.length>0 && (
                                  <div style={{ display:'flex', flexWrap:'wrap', gap:'3px', paddingTop:'6px', borderTop:'1px solid rgba(28,25,23,0.06)' }}>
                                    {names.slice(0,5).map(n=><span key={n} style={{ fontSize:'10px', color:C.tSec, background:C.canvas, padding:'2px 6px', borderRadius:'8px', whiteSpace:'nowrap' }}>{n}</span>)}
                                    {count>5 && <span style={{ fontSize:'10px', color:C.tMut, alignSelf:'center' }}>+{count-5} more</span>}
                                  </div>
                                )}
                              </div>
                            );
                          })()}
                        </div>
                        {/* SUB SKILLS */}
                        <div style={{ display:'flex', alignItems:'center', gap:'5px', marginTop:'10px', paddingTop:'9px', borderTop:`1px solid ${cs.gridStroke}`, flexWrap:'wrap' }}>
                          <span style={{ fontSize:'9px', fontWeight:'700', letterSpacing:'0.1em', color:cs.dimText, textTransform:'uppercase', flexShrink:0, marginRight:'2px' }}>Sub Skills</span>
                          {chartTrends.skills.map(({label,pts},j)=>{
                            const isAct=activeSubSkill===j;
                            return (
                              <button key={label} onClick={()=>setActiveSubSkill(isAct?null:j)} style={{
                                display:'flex', alignItems:'center', gap:'4px', padding:'3px 9px', borderRadius:'14px', cursor:'pointer',
                                border:`1px solid ${isAct?cs.valText:cs.gridStroke}`, background:isAct?cs.nowFill:'transparent',
                                transition:'all 120ms', opacity:isAct?1:0.75,
                              }}>
                                <span style={{ fontSize:'11px', color:cs.valText, fontWeight:isAct?'700':'400', whiteSpace:'nowrap' }}>{label}</span>
                                <span style={{ fontSize:'10px', color:cs.dimText, fontWeight:'600' }}>{pts[6]}/15</span>
                              </button>
                            );
                          })}
                        </div>
                      </div>

                      {/* Bottom stats */}
                      <div style={{ display:'flex', alignItems:'center', marginBottom:'12px', flexWrap:'wrap' }}>
                        {[{count:4,label:'fully ready'},{count:8,label:'building'},{count:3,label:'need focus'}].map(({count,label},i)=>(
                          <React.Fragment key={label}>
                            {i>0 && <span style={{ fontSize:'12px', color:'#A8A29E', margin:'0 8px' }}>·</span>}
                            <span style={{ fontSize:'12px', color:'#1A1A1A' }}><span style={{ fontWeight:'700' }}>{count}</span>{' '}<span style={{ color:'#6B7280' }}>{label}</span></span>
                          </React.Fragment>
                        ))}
                        <span style={{ fontSize:'12px', color:'#A8A29E', margin:'0 8px' }}>|</span>
                        <span style={{ fontSize:'12px', color:'#6B7280' }}>Q2 goal: L2+ · 4/15 ready</span>
                      </div>

                      <div style={{ display:'flex', gap:'8px', paddingTop:'12px', borderTop:'1px solid #F0F0F0' }}>
                        <button style={{ padding:'8px 16px', borderRadius:'6px', background:C.accent, border:'none', color:'#fff', fontSize:'13px', fontWeight:'600', cursor:'pointer' }}>Open in Coursera →</button>
                        <button style={{ padding:'8px 14px', borderRadius:'6px', background:'transparent', border:'1px solid #E0E0E0', color:'#6B7280', fontSize:'13px', fontWeight:'500', cursor:'pointer' }}>Export to Workday</button>
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Team members */}
              <div className="fade-up-d1" style={{ background: '#fff', border: '1px solid #E0E0E0', borderRadius: '10px', overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
                <div style={{ padding: '14px 18px', borderBottom: '1px solid #F0F0F0', fontSize: '14px', fontWeight: '600', color: '#1A1A1A' }}>Team Members</div>
                {members.map((m, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '11px 18px', borderBottom: i < members.length - 1 ? '1px solid #F5F5F5' : 'none' }}>
                    <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: m.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: '700', color: '#fff', flexShrink: 0 }}>
                      {m.name.split(' ').map(n => n[0]).join('')}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: '13px', fontWeight: '500', color: '#1A1A1A' }}>{m.name}</div>
                      <div style={{ fontSize: '11px', color: '#8E8E93' }}>{m.role}</div>
                    </div>
                    <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
                      {Array.from({ length: 4 }, (_, j) => (
                        <div key={j} style={{ width: '10px', height: '10px', borderRadius: '50%', background: j < m.skills ? m.color : '#E0E0E0' }}/>
                      ))}
                    </div>
                    <div style={{ fontSize: '12px', color: '#8E8E93', width: '58px', textAlign: 'right', flexShrink: 0 }}>{m.skills}/4 skills</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Right column — info panel */}
            <div>
              <div className="fade-up-d2" style={{ background: '#fff', border: '1px solid #E0E0E0', borderRadius: '10px', padding: '18px', boxShadow: '0 1px 4px rgba(0,0,0,0.06)', marginBottom: '12px' }}>
                <div style={{ fontSize: '13px', fontWeight: '600', color: '#1A1A1A', marginBottom: '12px' }}>Q2 Progress</div>
                <div style={{ marginBottom: '14px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: '#6B7280', marginBottom: '5px' }}>
                    <span>Team at L2+</span>
                    <span style={{ fontWeight: '600', color: C.accent }}>9 / 15</span>
                  </div>
                  <div style={{ height: '8px', background: '#E0E0E0', borderRadius: '4px', overflow: 'hidden' }}>
                    <div style={{ width: '60%', height: '100%', background: C.accent, borderRadius: '4px' }}/>
                  </div>
                </div>
                <div style={{ fontSize: '12px', color: '#6B7280', lineHeight: '1.6' }}>
                  6 members still need to complete at least 2 more skill verifications before Q2 closes on June 30.
                </div>
              </div>

              <div className="fade-up-d2" style={{ background: 'rgba(231,111,58,0.05)', border: '1px solid rgba(231,111,58,0.2)', borderRadius: '10px', padding: '16px' }}>
                <div style={{ display: 'flex', gap: '8px', alignItems: 'flex-start', marginBottom: '10px' }}>
                  <span style={{ fontSize: '15px', lineHeight: 1.3 }}>⚡</span>
                  <div style={{ fontSize: '13px', fontWeight: '600', color: C.warm }}>Action needed</div>
                </div>
                <p style={{ fontSize: '12px', color: '#6B7280', lineHeight: '1.6', marginBottom: '12px' }}>
                  Marcus Chen hasn't started Prototyping & Iteration. This skill is required for his Q2 rubric goal.
                </p>
                <button style={{ width: '100%', padding: '8px', borderRadius: '6px', background: C.warm, border: 'none', color: '#fff', fontSize: '12px', fontWeight: '600', cursor: 'pointer' }}>
                  Send reminder →
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════
     APP
  ══════════════════════════════════════════════════════════ */
  function App() {
    const [active, setActive] = useState('slack');
    return (
      <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <Navigator active={active} onSelect={setActive}/>
        <div key={active} style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
          {active === 'slack'   && <SlackView/>}
          {active === 'claude'  && <ClaudeView/>}
          {active === 'workday' && <WorkdayView/>}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
